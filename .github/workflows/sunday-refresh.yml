name: Sunday Projection Refresh

# ---------------------------------------------------------------------------
# Triggers
# ---------------------------------------------------------------------------
# Cron: Sunday 15:30 UTC (~10:30am ET) — timing rationale:
#   - After the Sunday 14:00 UTC player-props snapshot (odds-capture.yml),
#     so the props snapshot runs first and is committed before we refresh.
#   - ~1.5h before early kickoffs (~17:00 UTC / 1pm ET) — after Sunday
#     morning inactives are published (~11:30am ET) and lineups are finalized.
#   - ~30m before the Sleeper consensus window locks for grading, so our
#     refreshed projections will be live before most users check lineups.
#
# Strategy: re-apply the LATEST injury/inactive data to the already-published
# Gold weekly projections WITHOUT re-running the model.  This is cheap,
# leak-free, and targets the RB/WR rank-ordering gap that research attributes
# to Tuesday-projection staleness vs Sunday-morning inactives.
#
# workflow_dispatch for manual one-off runs:
#   gh workflow run sunday-refresh.yml
#   gh workflow run sunday-refresh.yml -f season=2026 -f week=5
on:
  schedule:
    # Two passes because "11:30am ET inactives" moves in UTC across the DST
    # boundary (EDT Sep-Oct: 15:30 UTC; EST Nov+: 16:30 UTC). The refresh is
    # idempotent and uses zero API credits, so running both year-round is
    # free — the second pass picks up EST-era inactives and any late news.
    - cron: "35 15 * * 0"   # 15:35 UTC Sunday — post-inactives during EDT
    - cron: "45 16 * * 0"   # 16:45 UTC Sunday — post-inactives during EST,
                            # still ~15 min pre-kickoff in EDT weeks

  workflow_dispatch:
    inputs:
      season:
        description: "NFL season year (e.g. 2026). Leave blank to auto-detect."
        required: false
        type: string
      week:
        description: "NFL week number (1-18). Leave blank to auto-detect."
        required: false
        type: string
      scoring:
        description: "Scoring format: half_ppr, ppr, standard, or all (default: all)"
        required: false
        type: string
        default: "all"

# ---------------------------------------------------------------------------
# Prevent concurrent Sunday runs from racing on the same parquet directory.
# cancel-in-progress: false so a slow run always completes and we never
# silently skip a snapshot.
# ---------------------------------------------------------------------------
concurrency:
  group: sunday-refresh
  cancel-in-progress: false

# ---------------------------------------------------------------------------
# Permissions
# The workflow commits new Gold parquet files back to main (TD-08/09 pattern).
# contents:write + issues:write required.
# ---------------------------------------------------------------------------
permissions:
  contents: write
  issues: write

# ---------------------------------------------------------------------------
# Jobs
# ---------------------------------------------------------------------------
jobs:
  refresh:
    name: Re-apply Sunday injury/inactive data to Gold projections
    runs-on: ubuntu-latest

    steps:
      # -----------------------------------------------------------------------
      # 1. Checkout
      # -----------------------------------------------------------------------
      - name: Checkout repository
        uses: actions/checkout@v4

      # -----------------------------------------------------------------------
      # 2. Python
      # -----------------------------------------------------------------------
      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: requirements.txt

      # -----------------------------------------------------------------------
      # 3. Dependencies
      # -----------------------------------------------------------------------
      - name: Install Python dependencies
        run: pip install -r requirements.txt

      # -----------------------------------------------------------------------
      # 4. Run Sunday refresh
      # Fail-open by design:
      #   - No Gold file for target week → exits 0 with a log message.
      #   - No fresh injury data → exits 0 with a log message.
      #   - nfl-data-py timeout / upstream unavailable → Bronze fallback,
      #     or exits 0 if Bronze also has no data.
      # The script never returns a non-zero exit code except for unexpected
      # Python errors — hard failures are caught by the notify-failure job.
      # -----------------------------------------------------------------------
      - name: Run Sunday projection refresh
        run: |
          python scripts/sunday_projection_refresh.py \
            ${{ inputs.season && format('--season {0}', inputs.season) || '' }} \
            ${{ inputs.week && format('--week {0}', inputs.week) || '' }} \
            --scoring ${{ inputs.scoring || 'all' }} \
            2>&1 || true

      # -----------------------------------------------------------------------
      # 5. Commit refreshed Gold files back to repo
      # Pattern mirrors odds-capture.yml (TD-08/09):
      #   - git add only the Gold projections path
      #   - skip commit when nothing changed (preseason / no injury data)
      #   - rebase-and-retry up to 3× to handle concurrent pushes
      # -----------------------------------------------------------------------
      - name: Commit refreshed projections to repo
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          git add data/gold/projections/ 2>/dev/null || true

          if git diff --cached --quiet; then
            echo "No refreshed projection files to commit (preseason, no injury data, or all statuses unchanged)"
          else
            COUNT=$(git diff --cached --name-only | wc -l | tr -d ' ')

            git commit -m "data(refresh): Sunday injury refresh — ${COUNT} file(s)

          Automated Sunday 15:30 UTC projection refresh: re-applied latest
          injury/inactive data to published Gold projections without re-running
          the model.  Targets RB/WR rank-ordering gap from Tuesday staleness."

            for attempt in 1 2 3; do
              if git push 2>&1; then
                echo "Pushed ${COUNT} refreshed projection file(s) (attempt ${attempt})"
                break
              fi
              echo "Push attempt ${attempt} rejected; rebasing onto origin/main..."
              git fetch origin main
              git rebase origin/main || {
                echo "::error::Rebase conflict on projection refresh commit — manual intervention required"
                exit 1
              }
              if [ "$attempt" = "3" ]; then
                echo "::error::Push rejected 3 times after rebase — bailing"
                exit 1
              fi
            done
          fi

      # -----------------------------------------------------------------------
      # 6. Always-run summary notice
      # -----------------------------------------------------------------------
      - name: Log refresh summary
        if: always()
        run: |
          echo "::notice::Sunday projection refresh complete. Check step output for player status changes."
          echo "::notice::Timing: 15:30 UTC (post-inactives, pre-kickoff). Next run: next Sunday."

  # ---------------------------------------------------------------------------
  # Hard-failure notification — opens a GitHub issue when the refresh job
  # fails outright (rebase conflict, push rejection, Python error).
  # Normal fail-open exits (no data / preseason) do NOT land here.
  # ---------------------------------------------------------------------------
  notify-failure:
    name: Notify on hard failure
    runs-on: ubuntu-latest
    needs: refresh
    if: failure()
    permissions:
      issues: write

    steps:
      - name: Create GitHub issue for refresh failure
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const now = new Date().toISOString().split('T')[0];
            const title = `Sunday Projection Refresh Failed - ${now}`;
            const open = await github.rest.issues.listForRepo({
              owner: context.repo.owner,
              repo: context.repo.repo,
              state: 'open',
              labels: 'pipeline-failure',
            });
            if (open.data.some(i => i.title === title)) {
              core.info('Failure issue already open today — not duplicating.');
              return;
            }
            const runUrl = `${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`;
            await github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title,
              body: [
                '## Sunday Projection Refresh hard failure',
                '',
                'The Sunday injury re-application failed before completing.',
                'This week\'s projections may be stale (Tuesday injury snapshot only).',
                '',
                `Run: [${context.runId}](${runUrl})`,
                '',
                '## Diagnose',
                '```bash',
                'gh run view --log ' + context.runId,
                '# Manual retry:',
                'gh workflow run sunday-refresh.yml',
                '# Dry-run test:',
                'python scripts/sunday_projection_refresh.py --dry-run',
                '```',
                '',
                '_Auto-generated by sunday-refresh notify-failure._',
              ].join('\n'),
              labels: ['pipeline-failure', 'automated'],
            });
