name: Daily Sentiment Pipeline

# ---------------------------------------------------------------------------
# Triggers
# ---------------------------------------------------------------------------
# Cron: Every day at noon UTC (7am ET / 8am ET during DST).
# Captures the morning news cycle before most users check projections.
#
# workflow_dispatch allows manual runs from the GitHub Actions UI or CLI:
#   gh workflow run daily-sentiment.yml -f season=2026 -f week=1
on:
  schedule:
    - cron: "0 12 * * *"

  workflow_dispatch:
    inputs:
      season:
        description: "NFL season year (e.g. 2026). Leave blank to auto-detect."
        required: false
        type: string
      week:
        description: "NFL week number (1-18). Leave blank to auto-detect."
        required: false
        type: string

# Prevent concurrent sentiment runs from conflicting on file writes.
concurrency:
  group: daily-sentiment
  cancel-in-progress: false

# ---------------------------------------------------------------------------
# Permissions
# Workflow commits sentiment + roster data back to main each run, and creates
# an issue on failure. contents:write + issues:write are required.
# ---------------------------------------------------------------------------

permissions:
  contents: write
  issues: write

# ---------------------------------------------------------------------------
# Jobs
# ---------------------------------------------------------------------------

jobs:
  sentiment:
    name: Run Daily Sentiment Pipeline
    runs-on: ubuntu-latest

    steps:
      # ----------------------------------------------------------------
      # 1. Checkout
      # ----------------------------------------------------------------
      - name: Checkout repository
        uses: actions/checkout@v4

      # ----------------------------------------------------------------
      # 2. Python
      # ----------------------------------------------------------------
      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: requirements.txt

      # ----------------------------------------------------------------
      # 3. Dependencies
      # ----------------------------------------------------------------
      - name: Install Python dependencies
        run: pip install -r requirements.txt

      # ----------------------------------------------------------------
      # 4. Run pipeline
      # ANTHROPIC_API_KEY is OPTIONAL per D-06 (phase 61 CONTEXT):
      # - Missing key = rule-based extraction only (model path uses rule signals).
      # - Present key = optional website enrichment (Plan 06), gated by
      #   ENABLE_LLM_ENRICHMENT env var (default false).
      # - The pipeline NEVER fails because this key is missing.
      #
      # D-04 feature flag: ENABLE_LLM_ENRICHMENT is read from a repo variable
      # (Settings → Secrets and variables → Actions → Variables tab) and
      # defaults to 'false'.  Flip to 'true' to opt in to Haiku enrichment
      # once plan 61-06 ships the wiring.
      #
      # Sources ingested by the orchestrator (scripts/daily_sentiment_pipeline.py):
      #   1. RSS feeds (5 feeds)                    --skip-rss
      #   2. Reddit (fantasyfootball, nfl, DynastyFF) --skip-reddit
      #   3. Sleeper trending players                --skip-sleeper
      #   4. RotoWire RSS                            --skip-rotowire
      #   5. Pro Football Talk (PFT) RSS             --skip-pft
      # All five sources are free and API-key-free.
      # ----------------------------------------------------------------
      - name: Run daily sentiment pipeline
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          ENABLE_LLM_ENRICHMENT: ${{ vars.ENABLE_LLM_ENRICHMENT || 'false' }}
          # Phase 71 LLM-02: route the SentimentPipeline to the batched
          # claude_primary extractor whenever LLM enrichment is enabled.
          # When the gate is off (default), EXTRACTOR_MODE collapses to an
          # empty string — the pipeline then falls through to its own
          # 'auto' default (rule-based, zero-cost). Per-doc soft fallback
          # to RuleExtractor still kicks in if Claude calls error mid-run,
          # so this env var alone never hard-fails the daily cron.
          EXTRACTOR_MODE: ${{ (vars.ENABLE_LLM_ENRICHMENT == 'true') && 'claude_primary' || '' }}
        run: |
          python scripts/daily_sentiment_pipeline.py \
            ${{ inputs.season && format('--season {0}', inputs.season) || '' }} \
            ${{ inputs.week && format('--week {0}', inputs.week) || '' }} \
            --verbose

      # ----------------------------------------------------------------
      # 4b. Health summary — always runs, even on failure (if: always()).
      # Emits GitHub Actions notice annotations so reviewers can see at a
      # glance which extraction path was authoritative.  Never echoes the
      # secret itself (only the non-secret ENABLE_LLM_ENRICHMENT toggle).
      # ----------------------------------------------------------------
      - name: Log pipeline health summary
        if: always()
        env:
          ENABLE_LLM_ENRICHMENT: ${{ vars.ENABLE_LLM_ENRICHMENT || 'false' }}
          # Mirror the run-step gate so the health annotation reports the
          # actual mode that was active. Empty string ⇒ 'auto (rule-primary)'.
          EXTRACTOR_MODE: ${{ (vars.ENABLE_LLM_ENRICHMENT == 'true') && 'claude_primary' || '' }}
        run: |
          echo "::notice::Daily sentiment pipeline completed. Rule-first path is authoritative (D-06)."
          echo "::notice::LLM enrichment: ${ENABLE_LLM_ENRICHMENT:-false}"
          echo "::notice::Extractor mode: ${EXTRACTOR_MODE:-auto (rule-primary)}"

      # ----------------------------------------------------------------
      # 5. Refresh rosters from Sleeper (catches trades, FA signings,
      #    releases — phase 67 / v7.0). Fail-hard: no `|| echo` suffix.
      #    Set the repo variable SLEEPER_API_UNREACHABLE=true to skip
      #    when a known upstream outage is in progress.
      # ----------------------------------------------------------------
      - name: Refresh rosters from Sleeper
        env:
          SLEEPER_API_UNREACHABLE: ${{ vars.SLEEPER_API_UNREACHABLE || 'false' }}
        run: |
          # Roster refresh always targets the CURRENT preseason year,
          # independent of sentiment-backfill `inputs.season`. A historical
          # sentiment backfill (e.g. season=2025) has no preseason Gold data
          # to apply corrections to, which crashed the step (Phase 69-01).
          # TD-03 (Phase 75): replace hardcoded 2026 with auto-detected current year.
          python scripts/refresh_rosters.py \
            --season $(date +%Y)

      # ----------------------------------------------------------------
      # 5b. Refresh external rankings caches (Sleeper / FantasyPros /
      #     ESPN / Draft Sharks / FTN). Closes DATA_FEEDS.md gap #1
      #     (2026-07-01): these caches previously only advanced on site
      #     traffic or a manual CLI run. Fail-open — the website serves
      #     stale caches gracefully, so a fetch blip must not fail the
      #     sentiment cron. save_rankings() skips unchanged content, so
      #     the commit below stays quiet unless rankings actually moved.
      #     FTN staying empty until Ratcliffe submits (~Jul-Aug) is
      #     normal and logs as EMPTY, not FAILED.
      # ----------------------------------------------------------------
      - name: Refresh external rankings caches
        run: |
          python scripts/refresh_external_rankings.py --season $(date +%Y) \
            || echo "::warning::External rankings refresh failed — website will serve existing caches"

      # ----------------------------------------------------------------
      # 6. Commit and push new data back to repo
      # Railway auto-deploys from main, so this keeps the website fresh.
      # Adds data/bronze/players/rosters_live/ (phase 67) so the
      # Sleeper-sourced roster corrections ship with each deploy, and
      # data/external/ so daily rankings-cache refreshes ship too.
      # ----------------------------------------------------------------
      - name: Commit sentiment and roster data
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add \
            data/bronze/sentiment/ \
            data/silver/sentiment/ \
            data/gold/sentiment/ \
            data/gold/projections/ \
            data/bronze/players/rosters_live/ \
            data/external/ \
            2>/dev/null || true
          if git diff --cached --quiet; then
            echo "No new data to commit"
          else
            COUNT=$(git diff --cached --name-only | wc -l | tr -d ' ')
            git commit -m "data(daily): sentiment + roster + rankings refresh — ${COUNT} files

          Automated daily pipeline: RSS feeds, Sleeper trending, roster updates,
          external rankings caches."
            # Push race guard: if main moved during this run (e.g. an unrelated
            # human push raced us), rebase the data commit on top before pushing.
            # Retries up to 3 times before giving up. Prevents the silent
            # "rejected (fetch first)" failure that bit 2026-04-27 W17/W18 backfill.
            for attempt in 1 2 3; do
              if git push 2>&1; then
                echo "Pushed $COUNT new data files (attempt $attempt)"
                break
              fi
              if [ "$attempt" = "3" ]; then
                echo "::error::Push rejected 3 times — bailing"
                exit 1
              fi
              echo "Push attempt $attempt rejected; rebasing onto origin/main..."
              git fetch origin main
              git rebase origin/main || {
                echo "::error::Rebase conflict on data commit — manual intervention required"
                exit 1
              }
            done
          fi

      # ----------------------------------------------------------------
      # 7. Upload artifacts (always, even on failure — aids debugging).
      # Phase 67: roster_changes.log included so the audit trail for
      # TRADED / RELEASED / RECLASSIFIED entries survives the run.
      # ----------------------------------------------------------------
      - name: Upload sentiment + roster artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: sentiment-data-${{ github.run_id }}
          path: |
            data/gold/sentiment/
            data/silver/sentiment/
            data/bronze/players/rosters_live/
            roster_changes.log
          retention-days: 30
          if-no-files-found: ignore

  # --------------------------------------------------------------------------
  # Odds-capture freshness watchdog (2026-06-12).
  #
  # The odds-capture cron is deliberately fail-open (API blips must not
  # fail-hard), which means a dead ODDS_API_KEY, a disabled schedule, or an
  # API change could silently stop the 2x-daily snapshots — and line history
  # CANNOT be backfilled on the free tier. This independent daily check
  # opens a deduped GitHub issue when the newest snapshot is older than 36h.
  # Runs here (not in odds-capture.yml) because a dead cron can't monitor
  # itself.
  # --------------------------------------------------------------------------
  odds-freshness-watchdog:
    name: Odds snapshot freshness check
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Check newest odds snapshot age
        id: freshness
        run: |
          # Dead-zone guard: The Odds API posts NFL look-ahead lines most of
          # the year (verified: 75 games live in June), but roughly March-May
          # no lines exist, no snapshots are written, and staleness is
          # EXPECTED — alerting then would open a false issue whose presence
          # could suppress a real in-season alert via the dedupe check.
          MONTH=$(date -u +%m)
          case "$MONTH" in
            03|04|05)
              echo "stale=false" >> "$GITHUB_OUTPUT"
              echo "NFL odds dead zone (month $MONTH) — staleness check skipped."
              exit 0
              ;;
          esac
          # Snapshot filenames embed their capture time:
          # odds_YYYYMMDD_HHMMSS.parquet — sort lexicographically for newest.
          NEWEST=$(find data/bronze/odds_api/snapshots -name "odds_*.parquet" 2>/dev/null \
            | sed 's#.*/##' | sort | tail -1)
          if [ -z "$NEWEST" ]; then
            echo "stale=true" >> "$GITHUB_OUTPUT"
            echo "detail=No odds snapshot files found at all" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          STAMP=$(echo "$NEWEST" | sed -E 's/odds_([0-9]{8})_([0-9]{6})\.parquet/\1\2/')
          SNAP_EPOCH=$(date -u -d "${STAMP:0:8} ${STAMP:8:2}:${STAMP:10:2}:${STAMP:12:2}" +%s)
          AGE_H=$(( ( $(date +%s) - SNAP_EPOCH ) / 3600 ))
          echo "Newest snapshot: $NEWEST (${AGE_H}h old)"
          if [ "$AGE_H" -gt 36 ]; then
            echo "stale=true" >> "$GITHUB_OUTPUT"
            echo "detail=Newest snapshot ($NEWEST) is ${AGE_H}h old (threshold 36h)" >> "$GITHUB_OUTPUT"
          else
            echo "stale=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Open issue if odds capture is stale
        if: steps.freshness.outputs.stale == 'true'
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const now = new Date().toISOString().split('T')[0];
            const titlePrefix = 'Odds capture STALE — line history is being lost';
            const title = `${titlePrefix} (since ${now})`;
            // Dedupe on the PREFIX: one open issue per stale EPISODE.
            // Closing it (when capture resumes) re-arms the alert.
            const open = await github.rest.issues.listForRepo({
              owner: context.repo.owner,
              repo: context.repo.repo,
              state: 'open',
              labels: 'pipeline-failure',
            });
            if (open.data.some(i => i.title.startsWith(titlePrefix))) {
              core.info('Stale-odds issue already open — not duplicating.');
              return;
            }
            const runUrl = `${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`;
            await github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title,
              body: [
                '## Odds snapshot freshness check failed',
                '',
                `Detail: ${{ steps.freshness.outputs.detail }}`,
                '',
                'The odds-capture cron appears to have stopped. Every day without',
                'capture is **permanently lost** open/close line history (free tier',
                'cannot backfill). Likely causes: ODDS_API_KEY revoked/exhausted,',
                'The Odds API schema change, or the schedule was disabled.',
                '',
                '## Diagnose',
                '```bash',
                'gh run list --workflow=odds-capture.yml --limit 5',
                'python scripts/bronze_odds_api_ingestion.py --dry-run',
                '```',
                '',
                `Watchdog run: [${context.runId}](${runUrl})`,
                '',
                '_Auto-generated by the daily-sentiment odds watchdog._',
              ].join('\n'),
              labels: ['pipeline-failure', 'automated'],
            });

  # --------------------------------------------------------------------------
  # Failure notification — opens a GitHub issue when the pipeline fails.
  # Uses the built-in GITHUB_TOKEN (no extra secret needed).
  # --------------------------------------------------------------------------
  notify-failure:
    name: Notify on Failure
    runs-on: ubuntu-latest
    needs: sentiment
    if: failure()

    steps:
      - name: Create GitHub issue for pipeline failure
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const now = new Date().toISOString().split('T')[0];
            const runUrl = `${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`;

            await github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title: `Daily Sentiment Pipeline Failed - ${now}`,
              body: [
                `## Sentiment Pipeline Failure`,
                ``,
                `| Field | Value |`,
                `|-------|-------|`,
                `| Date | ${now} |`,
                `| Run | [${context.runId}](${runUrl}) |`,
                `| Triggered by | ${context.actor} |`,
                ``,
                `## Re-Run`,
                ``,
                '```bash',
                `gh workflow run daily-sentiment.yml`,
                '```',
                ``,
                `_Auto-generated by the daily-sentiment workflow._`,
              ].join('\n'),
              labels: ['pipeline-failure', 'automated'],
            });
