name: Daily Sentiment Pipeline

# ---------------------------------------------------------------------------
# Triggers
# ---------------------------------------------------------------------------
# Cron: Every day at noon UTC (7am ET / 8am ET during DST).
# Captures the morning news cycle before most users check projections.
#
# workflow_dispatch allows manual runs from the GitHub Actions UI or CLI:
#   gh workflow run daily-sentiment.yml -f season=2026 -f week=1
on:
  schedule:
    - cron: "0 12 * * *"

  workflow_dispatch:
    inputs:
      season:
        description: "NFL season year (e.g. 2026). Leave blank to auto-detect."
        required: false
        type: string
      week:
        description: "NFL week number (1-18). Leave blank to auto-detect."
        required: false
        type: string

# Prevent concurrent sentiment runs from conflicting on file writes.
concurrency:
  group: daily-sentiment
  cancel-in-progress: false

# ---------------------------------------------------------------------------
# Jobs
# ---------------------------------------------------------------------------

jobs:
  sentiment:
    name: Run Daily Sentiment Pipeline
    runs-on: ubuntu-latest

    steps:
      # ----------------------------------------------------------------
      # 1. Checkout
      # ----------------------------------------------------------------
      - name: Checkout repository
        uses: actions/checkout@v4

      # ----------------------------------------------------------------
      # 2. Python
      # ----------------------------------------------------------------
      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: requirements.txt

      # ----------------------------------------------------------------
      # 3. Dependencies
      # ----------------------------------------------------------------
      - name: Install Python dependencies
        run: pip install -r requirements.txt

      # ----------------------------------------------------------------
      # 4. Run pipeline
      # ANTHROPIC_API_KEY is optional — pipeline falls back to
      # rule-based extraction when it is not set.
      # ----------------------------------------------------------------
      - name: Run daily sentiment pipeline
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: |
          python scripts/daily_sentiment_pipeline.py \
            ${{ inputs.season && format('--season {0}', inputs.season) || '' }} \
            ${{ inputs.week && format('--week {0}', inputs.week) || '' }} \
            --verbose

      # ----------------------------------------------------------------
      # 5. Upload artifacts (always, even on failure — aids debugging)
      # ----------------------------------------------------------------
      - name: Upload sentiment artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: sentiment-data-${{ github.run_id }}
          path: |
            data/gold/sentiment/
            data/silver/sentiment/
          retention-days: 7
          if-no-files-found: ignore

  # --------------------------------------------------------------------------
  # Failure notification — opens a GitHub issue when the pipeline fails.
  # Uses the built-in GITHUB_TOKEN (no extra secret needed).
  # --------------------------------------------------------------------------
  notify-failure:
    name: Notify on Failure
    runs-on: ubuntu-latest
    needs: sentiment
    if: failure()

    steps:
      - name: Create GitHub issue for pipeline failure
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const now = new Date().toISOString().split('T')[0];
            const runUrl = `${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`;

            await github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title: `Daily Sentiment Pipeline Failed - ${now}`,
              body: [
                `## Sentiment Pipeline Failure`,
                ``,
                `| Field | Value |`,
                `|-------|-------|`,
                `| Date | ${now} |`,
                `| Run | [${context.runId}](${runUrl}) |`,
                `| Triggered by | ${context.actor} |`,
                ``,
                `## Re-Run`,
                ``,
                '```bash',
                `gh workflow run daily-sentiment.yml`,
                '```',
                ``,
                `_Auto-generated by the daily-sentiment workflow._`,
              ].join('\n'),
              labels: ['pipeline-failure', 'automated'],
            });
