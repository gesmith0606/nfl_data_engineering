name: Daily Sentiment Pipeline

# ---------------------------------------------------------------------------
# Triggers
# ---------------------------------------------------------------------------
# Cron: Every day at noon UTC (7am ET / 8am ET during DST).
# Captures the morning news cycle before most users check projections.
#
# workflow_dispatch allows manual runs from the GitHub Actions UI or CLI:
#   gh workflow run daily-sentiment.yml -f season=2026 -f week=1
on:
  schedule:
    - cron: "0 12 * * *"

  workflow_dispatch:
    inputs:
      season:
        description: "NFL season year (e.g. 2026). Leave blank to auto-detect."
        required: false
        type: string
      week:
        description: "NFL week number (1-18). Leave blank to auto-detect."
        required: false
        type: string

# Prevent concurrent sentiment runs from conflicting on file writes.
concurrency:
  group: daily-sentiment
  cancel-in-progress: false

# ---------------------------------------------------------------------------
# Permissions
# Workflow commits sentiment + roster data back to main each run, and creates
# an issue on failure. contents:write + issues:write are required.
# ---------------------------------------------------------------------------

permissions:
  contents: write
  issues: write

# ---------------------------------------------------------------------------
# Jobs
# ---------------------------------------------------------------------------

jobs:
  sentiment:
    name: Run Daily Sentiment Pipeline
    runs-on: ubuntu-latest

    steps:
      # ----------------------------------------------------------------
      # 1. Checkout
      # ----------------------------------------------------------------
      - name: Checkout repository
        uses: actions/checkout@v4

      # ----------------------------------------------------------------
      # 2. Python
      # ----------------------------------------------------------------
      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: requirements.txt

      # ----------------------------------------------------------------
      # 3. Dependencies
      # ----------------------------------------------------------------
      - name: Install Python dependencies
        run: pip install -r requirements.txt

      # ----------------------------------------------------------------
      # 4. Run pipeline
      # ANTHROPIC_API_KEY is OPTIONAL per D-06 (phase 61 CONTEXT):
      # - Missing key = rule-based extraction only (model path uses rule signals).
      # - Present key = optional website enrichment (Plan 06), gated by
      #   ENABLE_LLM_ENRICHMENT env var (default false).
      # - The pipeline NEVER fails because this key is missing.
      #
      # D-04 feature flag: ENABLE_LLM_ENRICHMENT is read from a repo variable
      # (Settings → Secrets and variables → Actions → Variables tab) and
      # defaults to 'false'.  Flip to 'true' to opt in to Haiku enrichment
      # once plan 61-06 ships the wiring.
      #
      # Sources ingested by the orchestrator (scripts/daily_sentiment_pipeline.py):
      #   1. RSS feeds (5 feeds)                    --skip-rss
      #   2. Reddit (fantasyfootball, nfl, DynastyFF) --skip-reddit
      #   3. Sleeper trending players                --skip-sleeper
      #   4. RotoWire RSS                            --skip-rotowire
      #   5. Pro Football Talk (PFT) RSS             --skip-pft
      # All five sources are free and API-key-free.
      # ----------------------------------------------------------------
      - name: Run daily sentiment pipeline
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          ENABLE_LLM_ENRICHMENT: ${{ vars.ENABLE_LLM_ENRICHMENT || 'false' }}
          # Phase 71 LLM-02: route the SentimentPipeline to the batched
          # claude_primary extractor whenever LLM enrichment is enabled.
          # When the gate is off (default), EXTRACTOR_MODE collapses to an
          # empty string — the pipeline then falls through to its own
          # 'auto' default (rule-based, zero-cost). Per-doc soft fallback
          # to RuleExtractor still kicks in if Claude calls error mid-run,
          # so this env var alone never hard-fails the daily cron.
          EXTRACTOR_MODE: ${{ (vars.ENABLE_LLM_ENRICHMENT == 'true') && 'claude_primary' || '' }}
        run: |
          python scripts/daily_sentiment_pipeline.py \
            ${{ inputs.season && format('--season {0}', inputs.season) || '' }} \
            ${{ inputs.week && format('--week {0}', inputs.week) || '' }} \
            --verbose

      # ----------------------------------------------------------------
      # 4b. Health summary — always runs, even on failure (if: always()).
      # Emits GitHub Actions notice annotations so reviewers can see at a
      # glance which extraction path was authoritative.  Never echoes the
      # secret itself (only the non-secret ENABLE_LLM_ENRICHMENT toggle).
      # ----------------------------------------------------------------
      - name: Log pipeline health summary
        if: always()
        env:
          ENABLE_LLM_ENRICHMENT: ${{ vars.ENABLE_LLM_ENRICHMENT || 'false' }}
          # Mirror the run-step gate so the health annotation reports the
          # actual mode that was active. Empty string ⇒ 'auto (rule-primary)'.
          EXTRACTOR_MODE: ${{ (vars.ENABLE_LLM_ENRICHMENT == 'true') && 'claude_primary' || '' }}
        run: |
          echo "::notice::Daily sentiment pipeline completed. Rule-first path is authoritative (D-06)."
          echo "::notice::LLM enrichment: ${ENABLE_LLM_ENRICHMENT:-false}"
          echo "::notice::Extractor mode: ${EXTRACTOR_MODE:-auto (rule-primary)}"

      # ----------------------------------------------------------------
      # 5. Refresh rosters from Sleeper (catches trades, FA signings,
      #    releases — phase 67 / v7.0). Fail-hard: no `|| echo` suffix.
      #    Set the repo variable SLEEPER_API_UNREACHABLE=true to skip
      #    when a known upstream outage is in progress.
      # ----------------------------------------------------------------
      - name: Refresh rosters from Sleeper
        env:
          SLEEPER_API_UNREACHABLE: ${{ vars.SLEEPER_API_UNREACHABLE || 'false' }}
        run: |
          # Roster refresh always targets the CURRENT preseason year,
          # independent of sentiment-backfill `inputs.season`. A historical
          # sentiment backfill (e.g. season=2025) has no preseason Gold data
          # to apply corrections to, which crashed the step (Phase 69-01).
          # TD-03 (Phase 75): replace hardcoded 2026 with auto-detected current year.
          python scripts/refresh_rosters.py \
            --season $(date +%Y)

      # ----------------------------------------------------------------
      # 6. Commit and push new data back to repo
      # Railway auto-deploys from main, so this keeps the website fresh.
      # Adds data/bronze/players/rosters_live/ (phase 67) so the
      # Sleeper-sourced roster corrections ship with each deploy.
      # ----------------------------------------------------------------
      - name: Commit sentiment and roster data
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add \
            data/bronze/sentiment/ \
            data/silver/sentiment/ \
            data/gold/sentiment/ \
            data/gold/projections/ \
            data/bronze/players/rosters_live/ \
            2>/dev/null || true
          if git diff --cached --quiet; then
            echo "No new data to commit"
          else
            COUNT=$(git diff --cached --name-only | wc -l | tr -d ' ')
            git commit -m "data(daily): sentiment + roster refresh — ${COUNT} files

          Automated daily pipeline: RSS feeds, Sleeper trending, roster updates."
            # Push race guard: if main moved during this run (e.g. an unrelated
            # human push raced us), rebase the data commit on top before pushing.
            # Retries up to 3 times before giving up. Prevents the silent
            # "rejected (fetch first)" failure that bit 2026-04-27 W17/W18 backfill.
            for attempt in 1 2 3; do
              if git push 2>&1; then
                echo "Pushed $COUNT new data files (attempt $attempt)"
                break
              fi
              echo "Push attempt $attempt rejected; rebasing onto origin/main..."
              git fetch origin main
              git rebase origin/main || {
                echo "::error::Rebase conflict on data commit — manual intervention required"
                exit 1
              }
              if [ "$attempt" = "3" ]; then
                echo "::error::Push rejected 3 times after rebase — bailing"
                exit 1
              fi
            done
          fi

      # ----------------------------------------------------------------
      # 7. Upload artifacts (always, even on failure — aids debugging).
      # Phase 67: roster_changes.log included so the audit trail for
      # TRADED / RELEASED / RECLASSIFIED entries survives the run.
      # ----------------------------------------------------------------
      - name: Upload sentiment + roster artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: sentiment-data-${{ github.run_id }}
          path: |
            data/gold/sentiment/
            data/silver/sentiment/
            data/bronze/players/rosters_live/
            roster_changes.log
          retention-days: 30
          if-no-files-found: ignore

  # --------------------------------------------------------------------------
  # Failure notification — opens a GitHub issue when the pipeline fails.
  # Uses the built-in GITHUB_TOKEN (no extra secret needed).
  # --------------------------------------------------------------------------
  notify-failure:
    name: Notify on Failure
    runs-on: ubuntu-latest
    needs: sentiment
    if: failure()

    steps:
      - name: Create GitHub issue for pipeline failure
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const now = new Date().toISOString().split('T')[0];
            const runUrl = `${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`;

            await github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title: `Daily Sentiment Pipeline Failed - ${now}`,
              body: [
                `## Sentiment Pipeline Failure`,
                ``,
                `| Field | Value |`,
                `|-------|-------|`,
                `| Date | ${now} |`,
                `| Run | [${context.runId}](${runUrl}) |`,
                `| Triggered by | ${context.actor} |`,
                ``,
                `## Re-Run`,
                ``,
                '```bash',
                `gh workflow run daily-sentiment.yml`,
                '```',
                ``,
                `_Auto-generated by the daily-sentiment workflow._`,
              ].join('\n'),
              labels: ['pipeline-failure', 'automated'],
            });
