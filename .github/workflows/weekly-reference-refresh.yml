name: Weekly Reference Data Refresh

# ---------------------------------------------------------------------------
# Refreshes the two git-committed nflverse reference datasets that everything
# else quietly depends on (DATA_FEEDS.md gap #2, closed 2026-07-01):
#
#   - data/bronze/schedules/    — TD-09: web/Dockerfile COPYs this path; also
#     feeds Silver game-context joins. In-season refresh captures flexed
#     game times.
#   - data/bronze/depth_charts/ — TD-08: PlayerNameResolver needs it present
#     in the GHA runner for sentiment name→ID resolution; also feeds the
#     rookie ranking fallback.
#
# Both were previously manual-only, which is how the 2026-06-12 stale-data
# incident class happens at season boundaries.
#
# Timing: Tuesday 08:00 UTC (4:00 AM EDT / 3:00 AM EST) — one hour BEFORE
# weekly-pipeline.yml (09:00 UTC) so the week's Silver transforms join
# against current schedules.
#
# Ingestion writes locally (no --s3 flag → no AWS creds needed) and each run
# appends a new timestamped parquet, so a prune step keeps only the newest
# file per season partition — git history preserves the old ones; the
# working tree (and the Railway/HF images built from it) stays one file per
# partition.
# ---------------------------------------------------------------------------
on:
  schedule:
    - cron: "0 8 * * 2"

  workflow_dispatch:
    inputs:
      season:
        description: "NFL season year (e.g. 2026). Leave blank to auto-detect."
        required: false
        type: string

concurrency:
  group: weekly-reference-refresh
  cancel-in-progress: false

permissions:
  contents: write
  issues: write

jobs:
  refresh:
    name: Refresh schedules + depth charts
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: requirements.txt

      - name: Install Python dependencies
        run: pip install -r requirements.txt

      # ----------------------------------------------------------------
      # Resolve season: March onward targets the upcoming/current season;
      # January-February still belongs to the previous season (playoffs).
      # ----------------------------------------------------------------
      - name: Resolve season
        id: season
        env:
          INPUT_SEASON: ${{ inputs.season }}
        run: |
          if [ -n "$INPUT_SEASON" ]; then
            SEASON="$INPUT_SEASON"
          else
            SEASON=$(python -c "from datetime import date; t = date.today(); print(t.year if t.month >= 3 else t.year - 1)")
          fi
          echo "season=$SEASON" >> "$GITHUB_OUTPUT"
          echo "Season: $SEASON"

      # ----------------------------------------------------------------
      # Ingest. Fail-hard (visibility via notify-failure) — a silent skip
      # here is exactly the staleness this workflow exists to prevent.
      # ----------------------------------------------------------------
      - name: Ingest schedules
        env:
          SEASON: ${{ steps.season.outputs.season }}
        run: |
          python scripts/bronze_ingestion_simple.py \
            --season "$SEASON" \
            --data-type schedules

      - name: Ingest depth charts
        env:
          SEASON: ${{ steps.season.outputs.season }}
        run: |
          python scripts/bronze_ingestion_simple.py \
            --season "$SEASON" \
            --data-type depth_charts

      # ----------------------------------------------------------------
      # Prune each season partition to its newest parquet. Guard: never
      # delete siblings if the newest file looks truncated (<1 KB or
      # <30% the size of the largest file it would replace) — an empty
      # upstream response must not wipe a good committed file.
      # ----------------------------------------------------------------
      - name: Prune old parquets (keep newest per partition)
        run: |
          python - <<'EOF'
          from pathlib import Path

          for root in (Path("data/bronze/schedules"), Path("data/bronze/depth_charts")):
              for season_dir in sorted(root.glob("season=*")):
                  files = sorted(season_dir.glob("*.parquet"))
                  if len(files) < 2:
                      continue
                  newest, older = files[-1], files[:-1]
                  biggest_old = max(f.stat().st_size for f in older)
                  if newest.stat().st_size < max(1024, int(0.3 * biggest_old)):
                      print(f"::warning::{newest} looks truncated "
                            f"({newest.stat().st_size}B vs {biggest_old}B) — keeping older files")
                      continue
                  for f in older:
                      print(f"prune: {f}")
                      f.unlink()
          EOF

      # ----------------------------------------------------------------
      # Commit + push with the same rebase-retry race guard as the daily
      # sentiment workflow. `git add -A` on these paths captures both the
      # new parquets and the pruned deletions.
      # ----------------------------------------------------------------
      - name: Commit reference data
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add -A data/bronze/schedules/ data/bronze/depth_charts/ 2>/dev/null || true
          if git diff --cached --quiet; then
            echo "No reference data changes to commit"
          else
            COUNT=$(git diff --cached --name-only | wc -l | tr -d ' ')
            git commit -m "data(weekly): schedules + depth charts refresh — ${COUNT} files

          Automated weekly reference refresh (TD-08/TD-09 paths)."
            for attempt in 1 2 3; do
              if git push origin main 2>&1; then
                echo "Pushed $COUNT reference data files (attempt $attempt)"
                break
              fi
              if [ "$attempt" = "3" ]; then
                echo "::error::Push rejected 3 times — bailing"
                exit 1
              fi
              echo "Push attempt $attempt rejected; rebasing onto origin/main..."
              git fetch origin main
              git rebase origin/main || {
                echo "::error::Rebase conflict on reference data commit — manual intervention required"
                exit 1
              }
            done
          fi

  notify-failure:
    name: Notify on Failure
    runs-on: ubuntu-latest
    needs: refresh
    if: failure()

    steps:
      - name: Create GitHub issue for refresh failure
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const now = new Date().toISOString().split('T')[0];
            const runUrl = `${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`;
            const titlePrefix = 'Weekly Reference Data Refresh Failed';
            // One open issue per episode — closing it re-arms the alert.
            const open = await github.rest.issues.listForRepo({
              owner: context.repo.owner,
              repo: context.repo.repo,
              state: 'open',
              labels: 'pipeline-failure',
            });
            if (open.data.some(i => i.title.startsWith(titlePrefix))) {
              core.info('Reference-refresh issue already open — not duplicating.');
              return;
            }
            await github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title: `${titlePrefix} - ${now}`,
              body: [
                '## Reference data refresh failure',
                '',
                'schedules / depth_charts did not refresh. These are the',
                'git-committed TD-08/TD-09 paths — PlayerNameResolver and the',
                'Railway Docker build depend on them staying present and fresh.',
                '',
                `Run: [${context.runId}](${runUrl})`,
                '',
                '## Re-Run',
                '```bash',
                'gh workflow run weekly-reference-refresh.yml',
                '```',
                '',
                '_Auto-generated by the weekly-reference-refresh workflow._',
              ].join('\n'),
              labels: ['pipeline-failure', 'automated'],
            });
