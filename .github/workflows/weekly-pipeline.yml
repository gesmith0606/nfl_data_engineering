name: Weekly NFL Data Pipeline

# ---------------------------------------------------------------------------
# Triggers
# ---------------------------------------------------------------------------
# Cron: Every Tuesday at 09:00 UTC.
# Monday Night Football typically concludes by ~01:00 UTC Tuesday, so data
# from the NFL API is reliably available by 09:00 UTC Tuesday morning.
#
# workflow_dispatch allows a one-off run directly from the GitHub Actions UI
# or via the GitHub CLI:
#   gh workflow run weekly-pipeline.yml -f season=2024 -f week=10
on:
  schedule:
    - cron: "0 9 * * 2"   # Tuesday 09:00 UTC

  workflow_dispatch:
    inputs:
      season:
        description: "NFL season year (e.g. 2024). Leave blank to auto-compute."
        required: false
        type: string
      week:
        description: "NFL week number (1-18). Leave blank to auto-compute."
        required: false
        type: string

# Prevent concurrent runs from stepping on each other's S3 writes.
concurrency:
  group: weekly-pipeline
  cancel-in-progress: false

# ---------------------------------------------------------------------------
# Environment — values that don't change between jobs
# ---------------------------------------------------------------------------
env:
  PYTHON_VERSION: "3.11"
  AWS_REGION: us-east-2
  S3_BUCKET_BRONZE: nfl-raw
  S3_BUCKET_SILVER: nfl-refined
  S3_BUCKET_GOLD: nfl-trusted
  DEFAULT_SEASON: "2024"   # fallback if auto-compute produces nothing sensible

# ---------------------------------------------------------------------------
jobs:
# ---------------------------------------------------------------------------

  # --------------------------------------------------------------------------
  # Job 1: compute-week
  # Determines the target season and week number for this pipeline run.
  # The result is exposed as a job output so downstream jobs can consume it
  # without re-computing it.
  # --------------------------------------------------------------------------
  compute-week:
    name: Compute Target Season / Week
    runs-on: ubuntu-latest

    outputs:
      season: ${{ steps.nfl_week.outputs.season }}
      week:   ${{ steps.nfl_week.outputs.week }}

    steps:
      - name: Determine NFL season and week from today's date
        id: nfl_week
        env:
          INPUT_SEASON: ${{ inputs.season }}
          INPUT_WEEK:   ${{ inputs.week }}
          # Optional env-level override (set in repo Settings → Variables)
          PIPELINE_WEEK_OVERRIDE: ${{ vars.PIPELINE_WEEK_OVERRIDE }}
        run: |
          python3 - <<'PYEOF'
          import os, datetime

          # ----------------------------------------------------------------
          # Priority order for season/week:
          #   1. workflow_dispatch inputs (explicit user override)
          #   2. PIPELINE_WEEK_OVERRIDE repository variable  e.g. "2024:10"
          #   3. Auto-computed from today's date
          # ----------------------------------------------------------------

          input_season = os.environ.get("INPUT_SEASON", "").strip()
          input_week   = os.environ.get("INPUT_WEEK",   "").strip()
          override     = os.environ.get("PIPELINE_WEEK_OVERRIDE", "").strip()

          if input_season and input_week:
              season = int(input_season)
              week   = int(input_week)
              print(f"Using workflow_dispatch inputs: season={season} week={week}")

          elif override and ":" in override:
              season_str, week_str = override.split(":", 1)
              season = int(season_str.strip())
              week   = int(week_str.strip())
              print(f"Using PIPELINE_WEEK_OVERRIDE: season={season} week={week}")

          else:
              # ----------------------------------------------------------------
              # Auto-compute NFL week.
              #
              # NFL regular season convention:
              #   - Season year = the calendar year in which the season starts
              #   - Week 1 begins on the first full Thursday-Sunday of September
              #     (i.e. the Thursday on or after September 5).
              #   - Each week is exactly 7 days.
              #   - Weeks 1-18 cover the regular season (through mid-January).
              #   - Postseason begins roughly week 19 onward — we cap at 18.
              #
              # This logic finds the Thursday that anchors Week 1 for the
              # current season year and computes elapsed weeks from there.
              # ----------------------------------------------------------------
              today  = datetime.date.today()
              year   = today.year

              def week1_thursday(yr: int) -> datetime.date:
                  """Return the Thursday on or after September 5 for year yr."""
                  sep5 = datetime.date(yr, 9, 5)
                  # weekday(): Monday=0 … Thursday=3 … Sunday=6
                  days_ahead = (3 - sep5.weekday()) % 7
                  return sep5 + datetime.timedelta(days=days_ahead)

              # Decide which season year we are currently in.
              # If we're before the current year's Week 1 Thursday, we're
              # still in the previous season's postseason (or off-season).
              anchor = week1_thursday(year)
              if today < anchor:
                  # We're in the previous season's post-season / off-season
                  season = year - 1
                  anchor = week1_thursday(season)
              else:
                  season = year

              days_since_week1 = (today - anchor).days
              week = (days_since_week1 // 7) + 1

              # Clamp to valid regular-season range (1-18)
              week = max(1, min(week, 18))

              print(f"Auto-computed: today={today} season={season} week={week}")

          # Write outputs for subsequent jobs via GITHUB_OUTPUT
          github_output = os.environ.get("GITHUB_OUTPUT", "")
          if github_output:
              with open(github_output, "a") as fh:
                  fh.write(f"season={season}\n")
                  fh.write(f"week={week}\n")
          else:
              # Local test fallback
              print(f"season={season}")
              print(f"week={week}")
          PYEOF

  # --------------------------------------------------------------------------
  # Job 2: run-pipeline
  # The three-stage Bronze → Silver → Gold pipeline, followed by a health
  # check.  Runs on the season/week computed above.
  # --------------------------------------------------------------------------
  run-pipeline:
    name: "Run Pipeline — Season ${{ needs.compute-week.outputs.season }} Week ${{ needs.compute-week.outputs.week }}"
    runs-on: ubuntu-latest
    needs: compute-week
    # Hard ceiling (post-push review): the informal budget is ~60 min; a
    # stalled PBP download must not silently burn the 6h GHA default.
    timeout-minutes: 90

    # Make season/week available as environment variables throughout all steps.
    env:
      SEASON: ${{ needs.compute-week.outputs.season }}
      WEEK:   ${{ needs.compute-week.outputs.week }}
      # For the gh CLI (deduped ML-fallback escalation issue in step 7).
      GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

    steps:
      # ------------------------------------------------------------------
      # 1. Source
      # ------------------------------------------------------------------
      - name: Checkout repository
        uses: actions/checkout@v4

      # ------------------------------------------------------------------
      # 2. Python runtime
      # ------------------------------------------------------------------
      - name: Set up Python ${{ env.PYTHON_VERSION }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip
          cache-dependency-path: requirements.txt

      # ------------------------------------------------------------------
      # 3. Dependencies
      # ------------------------------------------------------------------
      - name: Install Python dependencies
        run: pip install -r requirements.txt

      # ------------------------------------------------------------------
      # 4. AWS credentials
      # Configure the AWS SDK via official action. Credentials come from
      # repository secrets (Settings → Secrets and variables → Actions):
      #   AWS_ACCESS_KEY_ID
      #   AWS_SECRET_ACCESS_KEY
      #   AWS_REGION  (optional — defaults to us-east-2 set in env above)
      # ------------------------------------------------------------------
      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id:     ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region:            ${{ secrets.AWS_REGION || env.AWS_REGION }}

      # ------------------------------------------------------------------
      # 5. Bronze ingestion — player data for the current week, plus
      # the season-level data types needed by the Silver advanced
      # transformation and graph feature computation.
      #
      # Group A: weekly player data (same as before)
      # Group B: season-level NGS / PFR / QBR / PBP (needed for Silver
      #          advanced profiles and graph features).  These are all
      #          fail-open (continue-on-error: true) because nfl-data-py
      #          occasionally returns 404 for mid-season seasons, and the
      #          downstream steps handle missing data gracefully by falling
      #          back to NaN-filled columns.
      #
      # NOTE: PBP ingestion uses --include-participation so that both
      # data/bronze/pbp/ and data/bronze/pbp_participation/ are populated
      # in one pass.  The --seasons flag ingests the current and prior
      # season in one call so the graph trailing windows (wr_def_trail_*,
      # te_def_trail_*) have cross-season context from week 1 onward.
      # ------------------------------------------------------------------
      - name: Bronze — ingest player_weekly
        id: bronze_player_weekly
        run: |
          python scripts/bronze_ingestion_simple.py \
            --season "$SEASON" \
            --week   "$WEEK"   \
            --data-type player_weekly
          echo "records_player_weekly=$(python -c "
          import re, sys
          # parse last 'Records Ingested' line from stdout for summary
          " 2>/dev/null || echo unknown)" >> "$GITHUB_OUTPUT"

      - name: Bronze — ingest snap_counts
        id: bronze_snap_counts
        run: |
          python scripts/bronze_ingestion_simple.py \
            --season "$SEASON" \
            --week   "$WEEK"   \
            --data-type snap_counts

      - name: Bronze — ingest injuries
        id: bronze_injuries
        run: |
          python scripts/bronze_ingestion_simple.py \
            --season "$SEASON" \
            --week   "$WEEK"   \
            --data-type injuries

      - name: Bronze — ingest rosters
        id: bronze_rosters
        # Rosters are season-level; allow failure without blocking the pipeline.
        continue-on-error: true
        run: |
          python scripts/bronze_ingestion_simple.py \
            --season "$SEASON" \
            --week   "$WEEK"   \
            --data-type rosters

      # ------------------------------------------------------------------
      # 5b. Bronze — season-level data for ML feature assembly
      #
      # These types are ingested once per season (not per week).  We
      # request both $SEASON and $SEASON-1 in one call where the CLI
      # supports it.  All steps are fail-open: downstream Silver scripts
      # handle absent Bronze files by producing NaN-filled columns
      # (explicitly tested in the v4.2 leakage audit).
      #
      # ngs: NGS receiving/passing/rushing profiles (3 sub-types)
      # pfr_weekly: PFR pressure / blitz / rushing / receiving stats
      # qbr: ESPN QBR weekly ratings (QB-only; 2024+ may be absent from
      #      upstream nflverse — the Silver step handles NaN gracefully)
      # pbp + participation: PBP play-level data AND participation columns
      #      (--include-participation stores the minimal participation
      #       subset to data/bronze/pbp_participation/ in the same pass).
      #      Both the current season AND the prior season are ingested so
      #      the graph trailing windows cover the season boundary from w1.
      # ------------------------------------------------------------------
      - name: Bronze — ingest NGS (season-level)
        id: bronze_ngs
        continue-on-error: true
        run: |
          PREV_SEASON=$(( SEASON - 1 ))
          for s in "$PREV_SEASON" "$SEASON"; do
            python scripts/bronze_ingestion_simple.py \
              --season "$s" \
              --data-type ngs \
              || echo "::warning::NGS ingest failed for season $s — graph NGS features will be NaN"
          done

      - name: Bronze — ingest PFR weekly (season-level)
        id: bronze_pfr_weekly
        continue-on-error: true
        run: |
          PREV_SEASON=$(( SEASON - 1 ))
          for s in "$PREV_SEASON" "$SEASON"; do
            python scripts/bronze_ingestion_simple.py \
              --season "$s" \
              --data-type pfr_weekly \
              || echo "::warning::PFR weekly ingest failed for season $s — PFR features will be NaN"
          done

      - name: Bronze — ingest QBR (season-level)
        id: bronze_qbr
        continue-on-error: true
        run: |
          PREV_SEASON=$(( SEASON - 1 ))
          for s in "$PREV_SEASON" "$SEASON"; do
            python scripts/bronze_ingestion_simple.py \
              --season "$s" \
              --data-type qbr \
              --frequency weekly \
              || echo "::warning::QBR ingest failed for season $s — QBR features will be NaN"
          done

      - name: Bronze — ingest PBP + participation (current and prior season)
        id: bronze_pbp
        # PBP is the heaviest ingest (~100-400 MB per season from nfl-data-py).
        # Fail-open: graph features fall back to NaN-only when PBP is absent.
        # Both seasons are needed: prior season drives early-week trailing
        # windows (wr_def_trail_*, te_def_trail_*) before enough current-
        # season data accumulates.
        timeout-minutes: 25
        continue-on-error: true
        run: |
          PREV_SEASON=$(( SEASON - 1 ))
          for s in "$PREV_SEASON" "$SEASON"; do
            python scripts/bronze_ingestion_simple.py \
              --season "$s" \
              --data-type pbp \
              --include-participation \
              || echo "::warning::PBP ingest failed for season $s — graph WR/TE features will be NaN"
          done

      # ------------------------------------------------------------------
      # 6. Silver transformation — usage + advanced profiles
      # ------------------------------------------------------------------
      - name: Silver — player transformation
        id: silver_transform
        run: |
          python scripts/silver_player_transformation.py \
            --season "$SEASON" \
            --week   "$WEEK"

      - name: Silver — advanced player profiles (NGS/PFR/QBR)
        id: silver_advanced
        # Fail-open: if NGS/PFR/QBR Bronze was not ingested above, this
        # produces a file with NaN-filled advanced columns.  The --ml path
        # treats those NaN columns as missing features and imputes them,
        # so projections degrade gracefully rather than crashing.
        continue-on-error: true
        run: |
          python scripts/silver_advanced_transformation.py \
            --season "$SEASON" \
            --no-s3 \
            || echo "::warning::silver_advanced_transformation failed for season $SEASON — advanced (NGS/PFR/QBR) features will be NaN in --ml path"

      - name: Silver — graph features (prior season + current season)
        id: silver_graph
        # compute_graph_features loads PBP + participation for every season
        # in the --seasons list.  We pass both $SEASON-1 and $SEASON so
        # the WR/TE trailing-window features (wr_def_trail_*, te_def_trail_*)
        # have cross-season context from week 1.
        #
        # Timing: ~2.5 min per season locally (2025, full season, 143 s).
        # Two seasons: ~5 min.  Total added pipeline time: ~7-8 min, well
        # within the 60-min budget target.
        #
        # Fail-open: when PBP Bronze was not ingested (step bronze_pbp
        # above failed), compute_graph_features produces empty DataFrames
        # per feature group and saves nothing.  The --ml path handles
        # missing Silver graph_features by using NaN-filled columns.
        continue-on-error: true
        run: |
          PREV_SEASON=$(( SEASON - 1 ))
          python scripts/compute_graph_features.py \
            --seasons "$PREV_SEASON" "$SEASON" \
            || echo "::warning::compute_graph_features failed for seasons $PREV_SEASON $SEASON — WR/TE graph features will be NaN in --ml path"

      # ------------------------------------------------------------------
      # 7. Gold projection generation (half_ppr scoring) — HYBRID ML path
      #
      # v4.3 (2026-06-12): --ml is now the primary path.  HYBRID_POSITIONS
      # = {"TE", "WR"} use Ridge residual correction (sealed-2025 gate:
      # WR −0.075, TE −0.428 MAE vs Sleeper consensus).  QB/RB remain
      # heuristic-only (SKIP verdict; XGB degrades both positions).
      #
      # Fail-open design:
      #   1. Run generate_projections.py --ml.
      #   2. Run scripts/check_ml_output.py to verify:
      #        - output file was written
      #        - hybrid positions (TE/WR) appear in projection_source
      #        - no position has all-zero projected_points
      #   3. If either step exits non-zero, re-run WITHOUT --ml
      #      (heuristic-only) and emit a ::warning so the failure is
      #      visible in the Actions UI without blocking the pipeline.
      #
      # The dashboard step (7b) runs unconditionally after this step
      # regardless of which path succeeded.
      # ------------------------------------------------------------------
      - name: Gold — generate projections (half_ppr, hybrid ML)
        id: gold_projections
        run: |
          set +e   # do not exit on first error; we handle failures below

          ML_EXIT=0
          SANITY_EXIT=0

          # --- Attempt 1: hybrid ML path ---
          python scripts/generate_projections.py \
            --season  "$SEASON"   \
            --week    "$WEEK"     \
            --scoring half_ppr    \
            --ml                  \
            --output  s3
          ML_EXIT=$?

          if [ "$ML_EXIT" -eq 0 ]; then
            # Quick sanity: verify hybrid positions present + no all-zero positions
            python scripts/check_ml_output.py \
              --season "$SEASON" \
              --week   "$WEEK"   \
              --scoring half_ppr
            SANITY_EXIT=$?
          fi

          if [ "$ML_EXIT" -ne 0 ] || [ "$SANITY_EXIT" -ne 0 ]; then
            echo "::warning::--ml projection failed (ml_exit=$ML_EXIT sanity_exit=$SANITY_EXIT) — falling back to heuristic-only"

            # If the --ml run PUBLISHED before validation failed, remove the
            # invalidated artifact (post-push review: publish-then-validate
            # race — latest-wins already favors the fallback file written
            # below, but the bad file must not linger as a permanent orphan).
            if [ "$ML_EXIT" -eq 0 ] && [ "$SANITY_EXIT" -ne 0 ]; then
              # NOTE: generate_projections.py writes UNPADDED week dirs
              # (week=5, not week=05) — a padded glob here is a no-op for
              # weeks 1-9 (post-push review catch).
              BAD_LOCAL=$(ls -t data/gold/projections/season=${SEASON}/week=${WEEK}/*.parquet 2>/dev/null | head -1)
              if [ -n "$BAD_LOCAL" ]; then
                BAD_KEY="projections/season=${SEASON}/week=${WEEK}/$(basename "$BAD_LOCAL")"
                aws s3 rm "s3://nfl-trusted/${BAD_KEY}" 2>/dev/null \
                  && echo "Removed invalidated ML artifact from S3: ${BAD_KEY}" \
                  || echo "Note: could not remove ${BAD_KEY} from S3 (missing creds or object)"
                rm -f "$BAD_LOCAL"
                echo "Removed invalidated local ML artifact: $BAD_LOCAL"
              fi
            fi

            # Durable escalation (post-push review): repeated silent ML
            # fallbacks must not hide in per-run warnings. Open ONE deduped
            # issue; close it to re-arm after fixing the upstream cause.
            FALLBACK_TITLE="Weekly pipeline running on heuristic fallback — ML path failing"
            if ! gh issue list --state open --label pipeline-failure --json title \
                 --jq '.[].title' 2>/dev/null | grep -qF "$FALLBACK_TITLE"; then
              gh issue create --title "$FALLBACK_TITLE" \
                --label "pipeline-failure,automated" \
                --body "The Tuesday cron's --ml projection path failed (ml_exit=$ML_EXIT sanity_exit=$SANITY_EXIT) for season=$SEASON week=$WEEK; the pipeline published heuristic-only output. The hybrid WR/TE models are the consensus-winning configuration — diagnose the upstream data steps (NGS/PFR/QBR/PBP ingestion, silver advanced, graph features) in this run's logs. Close this issue once fixed to re-arm the alert." \
                2>/dev/null || echo "::warning::could not open fallback escalation issue"
            fi

            # --- Fallback: heuristic-only ---
            python scripts/generate_projections.py \
              --season  "$SEASON"   \
              --week    "$WEEK"     \
              --scoring half_ppr    \
              --output  s3
            HEURISTIC_EXIT=$?
            if [ "$HEURISTIC_EXIT" -ne 0 ]; then
              echo "Heuristic fallback also failed — pipeline cannot produce Gold projections"
              exit "$HEURISTIC_EXIT"
            fi
            echo "Heuristic-only projections written (ML path unavailable this run)"
          else
            echo "Hybrid ML projections written successfully"
          fi

      # ------------------------------------------------------------------
      # 7b. ELITE 3.1 Grading — grade the PREVIOUS week
      #
      # The Tuesday cron fires after Monday Night Football completes, so
      # actuals for week (WEEK-1) are finalised.  We grade that previous week.
      # Fail-open: a grading failure never blocks the pipeline.  Missing
      # upstream data (no consensus, no snapshots) produces a partial report
      # with warnings rather than an error.
      # ------------------------------------------------------------------
      - name: ELITE grading — grade previous week
        id: elite_grading
        continue-on-error: true
        run: |
          GRADE_WEEK=$(( WEEK - 1 ))
          if [ "$GRADE_WEEK" -lt 1 ]; then
            echo "Week $WEEK is week 1 — no previous week to grade; skipping."
            exit 0
          fi
          echo "Grading season=$SEASON week=$GRADE_WEEK"
          python scripts/weekly_grading_report.py \
            --season  "$SEASON"     \
            --week    "$GRADE_WEEK" \
            --scoring half_ppr      \
            --output-root output/grading \
          || {
            echo "::warning::weekly_grading_report exited non-zero for $SEASON w$GRADE_WEEK — report may be partial."
          }

      # ------------------------------------------------------------------
      # 8. Sanity check — validate projections/predictions before deploy
      # Exits 1 on CRITICAL failures (blocks pipeline), 0 on PASS/WARN.
      # ------------------------------------------------------------------
      - name: Sanity check — projections & predictions
        id: sanity_check
        run: |
          python scripts/sanity_check_projections.py \
            --all \
            --scoring half_ppr \
            --season "$SEASON" \
            --week   "$WEEK"

      # ------------------------------------------------------------------
      # 9. Health check — validates freshness and completeness across layers
      # ------------------------------------------------------------------
      - name: Health check — validate all S3 layers
        id: health_check
        run: |
          python scripts/check_pipeline_health.py \
            --season "$SEASON" \
            --week   "$WEEK"

      # ------------------------------------------------------------------
      # 10. Job summary — written to GitHub Actions summary tab
      # ------------------------------------------------------------------
      - name: Write pipeline summary
        if: success()
        run: |
          python3 - <<'PYEOF'
          import os, datetime

          season = os.environ["SEASON"]
          week   = os.environ["WEEK"]
          now    = datetime.datetime.utcnow().strftime("%Y-%m-%d %H:%M UTC")

          summary = f"""## NFL Weekly Pipeline — Season {season} Week {week}

          **Status**: SUCCESS
          **Completed**: {now}

          ### Data Ingested (Bronze Layer)

          | Data Type | Status |
          |-----------|--------|
          | player_weekly | ingested |
          | snap_counts | ingested |
          | injuries | ingested |
          | rosters | ingested (non-blocking) |
          | ngs | ingested (non-blocking) |
          | pfr_weekly | attempted — fail-open, see step log |
          | qbr | attempted — fail-open, see step log |
          | pbp + participation | attempted current+prior season — fail-open, see step log |

          ### Pipeline Stages

          | Stage | Status |
          |-------|--------|
          | Bronze ingestion | complete |
          | Silver — player transformation | complete |
          | Silver — advanced profiles (NGS/PFR/QBR) | attempted — fail-open, see step log |
          | Silver — graph features (prior+current season) | attempted — fail-open, see step log |
          | Gold projections (half_ppr, hybrid WR/TE ML) | complete |
          | Sanity check | passed |
          | Health check | passed |

          > Scoring format: **half_ppr** | Gold path: **hybrid ML (WR/TE Ridge residual)**
          > S3 region: **us-east-2**
          > Buckets: `nfl-raw` → `nfl-refined` → `nfl-trusted`
          """

          # Dedent — the heredoc indents with spaces that we strip
          lines = [l.lstrip() for l in summary.splitlines()]
          output = "\n".join(lines)

          github_step_summary = os.environ.get("GITHUB_STEP_SUMMARY", "")
          if github_step_summary:
              with open(github_step_summary, "w") as fh:
                  fh.write(output)
          else:
              print(output)
          PYEOF

  # --------------------------------------------------------------------------
  # Job 3: notify-failure
  # Opens a GitHub issue when the pipeline job fails so the team has a
  # visible, trackable record of each outage.  Uses the built-in GITHUB_TOKEN
  # — no extra secret needed.
  # --------------------------------------------------------------------------
  notify-failure:
    name: Notify on Pipeline Failure
    runs-on: ubuntu-latest
    needs: [compute-week, run-pipeline]
    # Only runs when run-pipeline fails or is cancelled.
    if: failure() || cancelled()

    env:
      SEASON: ${{ needs.compute-week.outputs.season }}
      WEEK:   ${{ needs.compute-week.outputs.week }}

    steps:
      - name: Create GitHub issue for pipeline failure
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const season = process.env.SEASON || "unknown";
            const week   = process.env.WEEK   || "unknown";

            const workflowUrl = `${process.env.GITHUB_SERVER_URL}/${process.env.GITHUB_REPOSITORY}/actions/runs/${process.env.GITHUB_RUN_ID}`;
            const now = new Date().toISOString();

            const body = [
              `## Pipeline Failure Details`,
              ``,
              `| Field | Value |`,
              `|-------|-------|`,
              `| Season | ${season} |`,
              `| Week | ${week} |`,
              `| Run ID | [${process.env.GITHUB_RUN_ID}](${workflowUrl}) |`,
              `| Triggered by | ${process.env.GITHUB_ACTOR} |`,
              `| Timestamp (UTC) | ${now} |`,
              ``,
              `## Investigation Steps`,
              ``,
              `1. Review the [full run log](${workflowUrl}) for the failing step`,
              `2. Check AWS credentials are valid (Settings → Secrets → Actions)`,
              `3. Verify S3 bucket accessibility: \`nfl-raw\`, \`nfl-refined\`, \`nfl-trusted\``,
              `4. Re-run manually: \`gh workflow run weekly-pipeline.yml -f season=${season} -f week=${week}\``,
              ``,
              `## Manual Re-Run Command`,
              ``,
              `\`\`\`bash`,
              `gh workflow run weekly-pipeline.yml \\`,
              `  -f season=${season} \\`,
              `  -f week=${week}`,
              `\`\`\``,
              ``,
              `_Auto-generated by the weekly-pipeline workflow._`,
            ].join("\n");

            await github.rest.issues.create({
              owner:  context.repo.owner,
              repo:   context.repo.repo,
              title:  `Weekly Pipeline Failed — Week ${week} (Season ${season})`,
              body:   body,
              labels: ["pipeline-failure", "automated"],
            });
