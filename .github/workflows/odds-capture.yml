name: Live Odds Capture

# ---------------------------------------------------------------------------
# Triggers
# ---------------------------------------------------------------------------
# Spreads/totals: 2×/day at 13:00 UTC and 21:00 UTC.
# Player props:   Sunday 14:00 UTC (~90 min before early kickoffs, when prop
#                 menus are final and inactives are out) + Thursday 22:00 UTC
#                 (TNF coverage, ~5 credits).
# Monitoring:     hard failures open a GitHub issue (notify-failure below);
#                 a silently-dead capture is caught by the freshness watchdog
#                 in daily-sentiment.yml (fail-open API errors can't fail
#                 this workflow by design).
#
# workflow_dispatch for manual one-off runs:
#   gh workflow run odds-capture.yml
on:
  schedule:
    - cron: "0 13 * * *"   # 13:00 UTC daily — morning spreads snapshot
    - cron: "0 21 * * *"   # 21:00 UTC daily — evening/closing spreads snapshot
    - cron: "0 14 * * 0"   # 14:00 UTC Sunday — weekly player-props snapshot
    - cron: "0 22 * * 4"   # 22:00 UTC Thursday — TNF props (~2h pre-kickoff;
                           # Sunday-only capture would never see TNF props)

  workflow_dispatch: {}

# ---------------------------------------------------------------------------
# Prevent overlapping runs from racing on the same parquet directory.
# cancel-in-progress: false so a slow run always completes and we never
# silently skip a snapshot.
# ---------------------------------------------------------------------------
concurrency:
  group: odds-capture
  cancel-in-progress: false

# ---------------------------------------------------------------------------
# Permissions
# The workflow commits new parquet files back to main (TD-08/09 pattern).
# contents:write is the only permission needed.
# ---------------------------------------------------------------------------
permissions:
  contents: write

# ---------------------------------------------------------------------------
# Jobs
# ---------------------------------------------------------------------------
jobs:
  capture:
    name: Fetch and persist odds snapshot
    runs-on: ubuntu-latest

    steps:
      # -----------------------------------------------------------------------
      # 1. Checkout (full depth not needed — shallow clone is fine for data push)
      # -----------------------------------------------------------------------
      - name: Checkout repository
        uses: actions/checkout@v4

      # -----------------------------------------------------------------------
      # 2. Python
      # -----------------------------------------------------------------------
      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: requirements.txt

      # -----------------------------------------------------------------------
      # 3. Dependencies
      # -----------------------------------------------------------------------
      - name: Install Python dependencies
        run: pip install -r requirements.txt

      # -----------------------------------------------------------------------
      # 4. Run ingestion
      # Exits 0 on any network/API error (fail-open design); the workflow
      # will never fail-hard because the API is temporarily unavailable.
      # -----------------------------------------------------------------------
      - name: Fetch NFL odds snapshot
        env:
          ODDS_API_KEY: ${{ secrets.ODDS_API_KEY }}
        run: |
          python scripts/bronze_odds_api_ingestion.py

      # -----------------------------------------------------------------------
      # 5. Commit new parquet files back to the repo
      # Pattern mirrors daily-sentiment.yml (TD-08/09):
      #   - git add only the specific path
      #   - skip commit when nothing changed (off-season / no games)
      #   - rebase-and-retry up to 3× to handle concurrent pushes
      # -----------------------------------------------------------------------
      - name: Commit odds snapshot to repo
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          git add data/bronze/odds_api/ 2>/dev/null || true

          if git diff --cached --quiet; then
            echo "No new odds data to commit (off-season or API returned no games)"
          else
            COUNT=$(git diff --cached --name-only | wc -l | tr -d ' ')
            HOUR=$(date -u +%H)
            SLOT=$( [ "$HOUR" -lt "17" ] && echo "morning" || echo "evening" )

            git commit -m "data(odds): live odds snapshot — ${COUNT} file(s) [${SLOT}]

          Automated 2x-daily odds capture via The Odds API (Phase 1.4)."

            for attempt in 1 2 3; do
              if git push 2>&1; then
                echo "Pushed ${COUNT} odds file(s) (attempt ${attempt})"
                break
              fi
              echo "Push attempt ${attempt} rejected; rebasing onto origin/main..."
              git fetch origin main
              git rebase origin/main || {
                echo "::error::Rebase conflict on odds data commit — manual intervention required"
                exit 1
              }
              if [ "$attempt" = "3" ]; then
                echo "::error::Push rejected 3 times after rebase — bailing"
                exit 1
              fi
            done
          fi

      # -----------------------------------------------------------------------
      # 6. Always-run quota notice so the log shows remaining credits.
      # -----------------------------------------------------------------------
      - name: Log quota reminder
        if: always()
        run: |
          echo "::notice::Odds capture complete. Check script output above for x-requests-remaining."
          echo "::notice::Free tier: 500 credits/month. 2x daily = ~60/month in-season."

  # ---------------------------------------------------------------------------
  # Weekly player-props snapshot — runs every Sunday 14:00 UTC.
  # Skipped automatically on non-Sunday cron triggers because the events list
  # returns no games within the 7-day window on most weekdays.
  # ---------------------------------------------------------------------------
  capture-props:
    name: Fetch and persist player-props snapshot (Sunday)
    runs-on: ubuntu-latest
    # Only run when triggered by the Sunday 14:00 UTC cron (minute=0, hour=14,
    # dow=0) or by a manual workflow_dispatch.  The daily 13:00/21:00 triggers
    # should NOT run this job — guard with github.event.schedule.
    if: >
      github.event_name == 'workflow_dispatch' ||
      github.event.schedule == '0 14 * * 0' ||
      github.event.schedule == '0 22 * * 4'

    steps:
      # -----------------------------------------------------------------------
      # 1. Checkout
      # -----------------------------------------------------------------------
      - name: Checkout repository
        uses: actions/checkout@v4

      # -----------------------------------------------------------------------
      # 2. Python
      # -----------------------------------------------------------------------
      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: requirements.txt

      # -----------------------------------------------------------------------
      # 3. Dependencies
      # -----------------------------------------------------------------------
      - name: Install Python dependencies
        run: pip install -r requirements.txt

      # -----------------------------------------------------------------------
      # 4. Run props ingestion
      # Two schedules share this job:
      #   Sunday 14:00 UTC  — days-ahead 2 covers the Sun+Mon slate
      #                       (13-15 games → 65-75 credits at 5 markets)
      #   Thursday 22:00 UTC — days-ahead 2 covers TNF (~1 game → 5 credits)
      # --max-credits 100 covers a full slate; the script's internal reserve
      # guard (stops when fewer than 50 credits remain) protects the daily
      # spreads cron's budget. Exits 0 on any network/API error (fail-open);
      # the independent freshness watchdog in daily-sentiment.yml catches a
      # silently dead capture.
      # -----------------------------------------------------------------------
      - name: Fetch NFL player-props snapshot
        env:
          ODDS_API_KEY: ${{ secrets.ODDS_API_KEY }}
        run: |
          python scripts/bronze_props_ingestion.py \
            --days-ahead 2 \
            --max-credits 100

      # -----------------------------------------------------------------------
      # 5. Commit new parquet files back to the repo
      # Mirrors the spreads commit pattern (TD-08/09).
      # -----------------------------------------------------------------------
      - name: Commit props snapshot to repo
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          git add data/bronze/odds_api/props/ 2>/dev/null || true

          if git diff --cached --quiet; then
            echo "No new props data to commit (off-season or no props posted yet)"
          else
            COUNT=$(git diff --cached --name-only | wc -l | tr -d ' ')

            git commit -m "data(props): player-props snapshot — ${COUNT} file(s) [Sunday]

          Automated weekly player-props capture via The Odds API (Phase 1.5)."

            for attempt in 1 2 3; do
              if git push 2>&1; then
                echo "Pushed ${COUNT} props file(s) (attempt ${attempt})"
                break
              fi
              echo "Push attempt ${attempt} rejected; rebasing onto origin/main..."
              git fetch origin main
              git rebase origin/main || {
                echo "::error::Rebase conflict on props data commit — manual intervention required"
                exit 1
              }
              if [ "$attempt" = "3" ]; then
                echo "::error::Push rejected 3 times after rebase — bailing"
                exit 1
              fi
            done
          fi

      # -----------------------------------------------------------------------
      # 6. Always-run quota notice.
      # -----------------------------------------------------------------------
      - name: Log props quota reminder
        if: always()
        run: |
          echo "::notice::Props capture complete. Check script output above for x-requests-remaining."
          echo "::notice::Budget: Sundays 65-75 credits (Sun+Mon slate, days-ahead 2) + Thursdays ~5 (TNF) = ~280-400/month props in-season; +~120 spreads = ~400-520 worst case in a 5-Sunday month vs the 500 free-tier cap. The in-script reserve guard (stop below 50 remaining) is what protects the spreads cron at the margin. Manual workflow_dispatch runs BOTH jobs (~75-85 extra credits)."

  # ---------------------------------------------------------------------------
  # Hard-failure notification (2026-06-12) — opens a GitHub issue when either
  # capture job fails outright (rebase conflict, push rejection, runner
  # error). API blips are fail-open and do NOT land here; a silently dead
  # capture is caught by the freshness watchdog in daily-sentiment.yml.
  # ---------------------------------------------------------------------------
  notify-failure:
    name: Notify on hard failure
    runs-on: ubuntu-latest
    needs: [capture, capture-props]
    if: failure()
    permissions:
      issues: write

    steps:
      - name: Create GitHub issue for capture failure
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const now = new Date().toISOString().split('T')[0];
            const title = `Odds Capture Failed - ${now}`;
            const open = await github.rest.issues.listForRepo({
              owner: context.repo.owner,
              repo: context.repo.repo,
              state: 'open',
              labels: 'pipeline-failure',
            });
            if (open.data.some(i => i.title === title)) {
              core.info('Failure issue already open today — not duplicating.');
              return;
            }
            const runUrl = `${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`;
            await github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title,
              body: [
                '## Odds capture hard failure',
                '',
                'Line history cannot be backfilled on the free tier — diagnose promptly.',
                '',
                `Run: [${context.runId}](${runUrl})`,
                '',
                '```bash',
                'gh run view --log ' + context.runId,
                'gh workflow run odds-capture.yml   # manual retry (runs both jobs)',
                '```',
                '',
                '_Auto-generated by odds-capture notify-failure._',
              ].join('\n'),
              labels: ['pipeline-failure', 'automated'],
            });
