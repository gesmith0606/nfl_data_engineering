name: Deploy Web Platform

on:
  push:
    branches: [main]
    paths:
      - "web/**"
      - "src/**"
      - "data/**"
      - ".github/workflows/deploy-web.yml"
  workflow_dispatch:

env:
  AWS_REGION: us-east-2

# ----------------------------------------------------------------
# Permissions: contents: write enables auto-rollback (Plan 68-03 SANITY-09)
# to git revert + push from the rollback job. NEVER use force-push to main.
# ----------------------------------------------------------------
permissions:
  contents: write
  actions: read

jobs:
  # ------------------------------------------------------------------
  # Quality Gate: sanity check must pass before any deploy (per D-07)
  # Exit code 1 from sanity_check_projections.py == CRITICAL issues
  # present -> this job fails -> both deploy jobs are blocked via
  # their `needs: quality-gate` dependency. Warnings-only runs exit
  # 0 and allow deploy to proceed.
  # ------------------------------------------------------------------
  quality-gate:
    name: Data Quality Gate
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: requirements.txt

      - name: Install Python dependencies
        run: pip install -r requirements.txt

      - name: Run sanity check
        run: |
          python scripts/sanity_check_projections.py \
            --scoring half_ppr \
            --season 2026
        # Exit code 1 on CRITICAL issues -> blocks deployment

      # Weekly partition gate (SANITY-M6): validates the weekly Gold
      # parquet the website's weekly view serves — freshness, duplicate
      # players, weekly-scale points, star-player ranks vs consensus.
      # Catches the 2026-06-12 incident class (42-day-old file with
      # CMC at RB118 / Drake Maye at QB29 baked into the deploy image).
      # A missing weekly partition is a SKIP (API falls back to
      # preseason); a present-but-stale or garbage one blocks deploy.
      - name: Run weekly projection gate
        run: |
          python scripts/sanity_check_projections.py \
            --check-weekly \
            --scoring half_ppr \
            --season 2026

      # --------------------------------------------------------------
      # Capture deploy metadata for the rollback window check. The
      # 5-minute gate in auto-rollback consumes DEPLOY_SHA +
      # DEPLOY_TIMESTAMP so stale workflow re-runs cannot revert an
      # unrelated commit. Artifact retention is 1 day (rollback
      # decision must happen long before then).
      # --------------------------------------------------------------
      - name: Record deploy metadata for rollback window
        run: |
          echo "DEPLOY_SHA=${{ github.sha }}" >> deploy_metadata.env
          echo "DEPLOY_TIMESTAMP=$(date -u +%s)" >> deploy_metadata.env

      - name: Upload deploy metadata
        uses: actions/upload-artifact@v4
        with:
          name: deploy-metadata
          path: deploy_metadata.env
          retention-days: 1

  # ------------------------------------------------------------------
  # Frontend deploy: Vercel auto-deploys https://frontend-jet-seven-33.vercel.app
  # from the main branch via its own GitHub webhook (independent of GHA).
  # The previous amondnet/vercel-action@v25 path was dead infra — VERCEL_TOKEN
  # was never set as a repo secret and every workflow_dispatch run failed with
  # "Input required and not supplied: vercel-token", yet the site was always
  # current because Vercel's native integration handled the deploy.
  #
  # Mirrors the deploy-backend (Railway) pattern: keep this job as a no-op so
  # the live-gate-blocking job's `needs: deploy-frontend` resolves, and wait
  # ~120s for Vercel's webhook deploy to settle before the live gate probes.
  # ------------------------------------------------------------------
  deploy-frontend:
    name: Wait for Vercel auto-deploy
    runs-on: ubuntu-latest
    needs: quality-gate
    steps:
      # Full history so `git merge-base --is-ancestor` can validate that a
      # live SHA newer than ours (a racing push) still descends from main.
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Verify live build converges on the pushed commit (hard gate)
        run: |
          # Sentinel gate (UI-REVIEW 2026-06-11 remediation #1): production
          # served a 14-day-stale build with no CI signal — the old soft
          # chunk-fingerprint warning could not block because unchanged
          # hashes are legitimate on warm-cache rebuilds. This gate is a
          # HARD check: /api/version reports VERCEL_GIT_COMMIT_SHA, and we
          # poll until it equals the pushed SHA (or a descendant of it,
          # when a newer push raced this workflow). 60s head start + 18
          # polls x 30s ≈ 9.5 minutes, generous for a Vercel build;
          # timeout = webhook freeze = fail the deploy loudly instead of
          # drifting silently.
          #
          # Hard status gate (200/307 on /) is kept — catches total outage.
          EXPECTED="${{ github.sha }}"
          BASE="https://frontend-jet-seven-33.vercel.app"

          STATUS=$(curl -s -o /dev/null -m 20 -w "%{http_code}" "$BASE/" || echo "000")
          echo "Frontend root status: $STATUS"
          if [ "$STATUS" != "200" ] && [ "$STATUS" != "307" ]; then
            echo "::error::Vercel root returned $STATUS — frontend is unreachable"
            exit 1
          fi

          # Vercel's webhook build takes 60-120s to even start serving —
          # polling earlier just burns budget against the old build.
          echo "Waiting 60s for the Vercel webhook build to start..."
          sleep 60

          LIVE="unknown"
          for i in $(seq 1 18); do
            LIVE=$(curl -s -m 20 "$BASE/api/version" | jq -r '.commit // "unknown"' 2>/dev/null || echo "unknown")
            echo "Poll $i/18: live commit = $LIVE (expected $EXPECTED)"
            if [ "$LIVE" = "$EXPECTED" ]; then
              echo "Live build matches the pushed commit."
              exit 0
            fi
            # A racing push may have deployed a NEWER commit that contains
            # ours — that is convergence, not drift.
            if echo "$LIVE" | grep -qE '^[0-9a-f]{40}$' && \
               git cat-file -e "$LIVE" 2>/dev/null && \
               git merge-base --is-ancestor "$EXPECTED" "$LIVE" 2>/dev/null; then
              echo "Live build ($LIVE) is a descendant of the pushed commit — converged via a newer push."
              exit 0
            fi
            # No sleep after the final poll — fail immediately.
            [ "$i" -lt 18 ] && sleep 30
          done
          echo "::error::Live frontend never served commit $EXPECTED within 10 minutes (last seen: $LIVE). Vercel webhook freeze suspected — check the Vercel dashboard deployments tab. Production may be serving a stale build. (If LIVE is persistently 'unknown' on a fresh deploy, ensure 'Automatically expose System Environment Variables' is enabled in Vercel project settings.)"
          exit 1

  # ------------------------------------------------------------------
  # Backend deploy: the production backend is the HF Spaces bridge
  # (https://gesmith0606-nfl-data-api.hf.space) since 2026-05-28, when
  # the Railway trial expired (the old Railway URL 404s on every route
  # — that read as a total live-site outage in the gate's first CI run
  # on 2026-06-11). The bridge serves prebuilt Parquet and does NOT
  # redeploy on push to this repo, so there is nothing to wait for —
  # we just probe /api/health so a dead bridge fails fast here instead
  # of as a confusing wall of 404s in the live gate. The job is kept
  # so live-gate-blocking's `needs: deploy-backend` still resolves.
  #
  # PARKED — Phase 79 D-06/D-07 SHA-match probe and its Phase 84
  # DEPLOY-02 hard-gate promotion: the bridge reports git_sha="unknown"
  # because it does not build from this repo, so a SHA match can never
  # succeed. Restore the probe from the git history of this file when
  # a per-commit-deploying backend (Railway or successor) returns.
  # ------------------------------------------------------------------
  deploy-backend:
    name: Probe backend (HF Spaces bridge)
    runs-on: ubuntu-latest
    needs: quality-gate
    steps:
      - name: Refresh HF Spaces bridge
        continue-on-error: true
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: |
          set -uo pipefail

          if [ -z "$HF_TOKEN" ]; then
            echo "::warning::HF_TOKEN not set — skipping HF Space refresh"
            exit 0
          fi

          # Clone HF Space repo
          REPO_URL="https://user:${HF_TOKEN}@huggingface.co/spaces/gesmith0606/nfl-data-api"
          TMP_HF_REPO="/tmp/nfl-data-api"

          if [ -d "$TMP_HF_REPO" ]; then
            rm -rf "$TMP_HF_REPO"
          fi

          git clone "$REPO_URL" "$TMP_HF_REPO" 2>&1 | grep -v "credential" || true
          cd "$TMP_HF_REPO"

          # Bump CACHE_BUST in app.py or README (check which exists)
          CACHE_VAL=$(($(date +%s) % 1000000))

          if grep -q "CACHE_BUST" app.py 2>/dev/null; then
            sed -i "s/CACHE_BUST = .*/CACHE_BUST = $CACHE_VAL/" app.py
            echo "Bumped CACHE_BUST in app.py to $CACHE_VAL"
          elif grep -q "CACHE_BUST" README.md 2>/dev/null; then
            sed -i "s/CACHE_BUST:.*/CACHE_BUST: $CACHE_VAL/" README.md
            echo "Bumped CACHE_BUST in README.md to $CACHE_VAL"
          else
            echo "::warning::CACHE_BUST not found in app.py or README.md — will add to app.py"
            echo "CACHE_BUST = $CACHE_VAL" >> app.py
          fi

          # Commit and push
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add -A
          if ! git diff --cached --quiet; then
            git commit -m "chore(cache): bump CACHE_BUST for frontend refresh"
            git push origin main 2>&1 | grep -v "credential" || true
            echo "HF Space refresh committed and pushed"
          else
            echo "No CACHE_BUST change needed"
          fi

          # Sync ANTHROPIC_API_KEY to HF runtime secrets (if set)
          if [ -n "$ANTHROPIC_API_KEY" ]; then
            RESPONSE=$(curl -s -X POST \
              "https://huggingface.co/api/spaces/gesmith0606/nfl-data-api/secrets" \
              -H "Authorization: Bearer $HF_TOKEN" \
              -H "Content-Type: application/json" \
              -d "{\"key\":\"ANTHROPIC_API_KEY\",\"value\":\"${ANTHROPIC_API_KEY}\"}" \
              2>&1 || echo "error")

            if echo "$RESPONSE" | grep -q "error"; then
              echo "::warning::Could not sync ANTHROPIC_API_KEY to HF — may already be set or permission issue"
            else
              echo "ANTHROPIC_API_KEY synced to HF Space runtime"
            fi
          fi

      - name: Probe bridge /api/health
        run: |
          set -uo pipefail
          BASE_URL="https://gesmith0606-nfl-data-api.hf.space"
          probe() {
            curl -s -o /dev/null -m 20 -w "%{http_code}" "${BASE_URL}/api/health" || echo "000"
          }
          HTTP=$(probe)
          echo "GET ${BASE_URL}/api/health -> HTTP ${HTTP}"
          if [ "${HTTP}" != "200" ]; then
            # HF Spaces free tier can cold-start; give it one retry.
            echo "Bridge not serving yet — retrying once after 30s (HF cold start)."
            sleep 30
            HTTP=$(probe)
            echo "GET ${BASE_URL}/api/health -> HTTP ${HTTP}"
          fi
          if [ "${HTTP}" != "200" ]; then
            echo "::error::HF Spaces bridge is not serving /api/health (HTTP ${HTTP}). The live gate would fail on every backend probe — failing fast here. Check https://huggingface.co/spaces/gesmith0606/nfl-data-api"
            exit 1
          fi
          echo "Bridge healthy."

  # ------------------------------------------------------------------
  # Live gate (BLOCKING per Plan 68-03 SANITY-08, SANITY-09):
  # Probes the LIVE backend + frontend AFTER deploy with the v2 gate
  # (predictions, lineups, sampled rosters, news content, extractor
  # freshness, roster drift, DQAL-03 carry-overs). Non-zero exit fails
  # this job, fails the workflow, and triggers the auto-rollback job
  # via its `needs: live-gate-blocking` + result==failure trigger.
  #
  # NO `continue-on-error` — failure here is intentional and gates
  # everything downstream including the rollback decision.
  # ------------------------------------------------------------------
  live-gate-blocking:
    name: Live Site Gate (Blocking)
    runs-on: ubuntu-latest
    needs: [deploy-frontend, deploy-backend]
    if: always() && (needs.deploy-frontend.result == 'success' || needs.deploy-backend.result == 'success')
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: requirements.txt

      - name: Install Python dependencies
        run: pip install -r requirements.txt

      # Give Vercel a moment to serve the new build on the edge. (The HF
      # Spaces bridge backend doesn't redeploy on push, so the wait is only
      # for frontend edge propagation.)
      - name: Wait for deployments to stabilise
        run: sleep 60

      - name: Run v2 sanity gate against live deployment
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          ENABLE_LLM_ENRICHMENT: ${{ vars.ENABLE_LLM_ENRICHMENT || 'false' }}
        run: |
          python scripts/sanity_check_projections.py \
            --check-live \
            --scoring half_ppr \
            --season 2026
        # Exit code != 0 fails the job, fails the workflow, triggers rollback.

  # ------------------------------------------------------------------
  # Auto-rollback (Plan 68-03 SANITY-09):
  # Triggers ONLY when live-gate-blocking fails AND the failing commit
  # is within 5 minutes of workflow start. Reverts HEAD with
  # `git revert --no-edit` and pushes to main. Railway auto-redeploys
  # the previous green commit on push. Revert commit message is:
  #   `revert: auto-rollback after sanity-check failure on <sha>`
  # so git log --oneline makes rollbacks auditable.
  #
  # NEVER force-push. NEVER bypass branch protection. The bot token
  # has contents:write only (configured at workflow root).
  # ------------------------------------------------------------------
  auto-rollback:
    name: Auto-Rollback on Live Gate Failure
    runs-on: ubuntu-latest
    needs: live-gate-blocking
    if: always() && needs.live-gate-blocking.result == 'failure'
    steps:
      - name: Checkout main
        uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 2
          # Use GITHUB_TOKEN (contents:write at workflow root)
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Download deploy metadata
        uses: actions/download-artifact@v4
        with:
          name: deploy-metadata

      - name: Verify 5-minute rollback window
        id: window_check
        run: |
          source deploy_metadata.env
          NOW=$(date -u +%s)
          ELAPSED=$(( NOW - DEPLOY_TIMESTAMP ))
          echo "DEPLOY_SHA=$DEPLOY_SHA"
          echo "Elapsed since deploy: ${ELAPSED}s"
          if [ "$ELAPSED" -gt 300 ]; then
            echo "ROLLBACK_SKIPPED=true" >> $GITHUB_OUTPUT
            echo "::warning::Rollback skipped — ${ELAPSED}s since deploy exceeds 5-minute window. Manual review required."
            exit 0
          fi
          echo "ROLLBACK_SKIPPED=false" >> $GITHUB_OUTPUT
          echo "deploy_sha=$DEPLOY_SHA" >> $GITHUB_OUTPUT

      - name: Configure git bot identity
        if: steps.window_check.outputs.ROLLBACK_SKIPPED != 'true'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

      - name: Revert failing deploy commit
        if: steps.window_check.outputs.ROLLBACK_SKIPPED != 'true'
        run: |
          SHA="${{ steps.window_check.outputs.deploy_sha }}"
          # HEAD on main should equal SHA since we just deployed it. Guard anyway.
          CURRENT_HEAD=$(git rev-parse HEAD)
          if [ "$CURRENT_HEAD" != "$SHA" ]; then
            echo "::error::HEAD ($CURRENT_HEAD) no longer matches deploy SHA ($SHA). Skipping rollback — someone else pushed. Manual review required."
            exit 1
          fi
          # TD-01 (Phase 75): single revert + commit with audit message.
          # No amend; pre-commit hooks now run on the rollback commit too.
          git revert --no-commit HEAD
          git commit -m "revert: auto-rollback after sanity-check failure on ${SHA}"

      - name: Push rollback to main
        if: steps.window_check.outputs.ROLLBACK_SKIPPED != 'true'
        run: |
          # Non-force push. Branch protection rules still apply.
          # If push is rejected (e.g., new commit raced us), surface as failure.
          git push origin main

      - name: Record rollback outcome
        if: always() && steps.window_check.outputs.ROLLBACK_SKIPPED != 'true'
        run: |
          echo "## Auto-Rollback Executed" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "Reverted commit: ${{ steps.window_check.outputs.deploy_sha }}" >> $GITHUB_STEP_SUMMARY
          echo "Railway will auto-redeploy the previous green commit." >> $GITHUB_STEP_SUMMARY
          echo "Review the live-gate-blocking failure before re-deploying." >> $GITHUB_STEP_SUMMARY
