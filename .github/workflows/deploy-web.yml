name: Deploy Web Platform

on:
  push:
    branches: [main]
    paths:
      - "web/**"
      - "src/**"
      - "data/**"
      - ".github/workflows/deploy-web.yml"
  workflow_dispatch:

env:
  AWS_REGION: us-east-2

# ----------------------------------------------------------------
# Permissions: contents: write enables auto-rollback (Plan 68-03 SANITY-09)
# to git revert + push from the rollback job. NEVER use force-push to main.
# ----------------------------------------------------------------
permissions:
  contents: write
  actions: read

jobs:
  # ------------------------------------------------------------------
  # Quality Gate: sanity check must pass before any deploy (per D-07)
  # Exit code 1 from sanity_check_projections.py == CRITICAL issues
  # present -> this job fails -> both deploy jobs are blocked via
  # their `needs: quality-gate` dependency. Warnings-only runs exit
  # 0 and allow deploy to proceed.
  # ------------------------------------------------------------------
  quality-gate:
    name: Data Quality Gate
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: requirements.txt

      - name: Install Python dependencies
        run: pip install -r requirements.txt

      - name: Run sanity check
        run: |
          python scripts/sanity_check_projections.py \
            --scoring half_ppr \
            --season 2026
        # Exit code 1 on CRITICAL issues -> blocks deployment

      # --------------------------------------------------------------
      # Capture deploy metadata for the rollback window check. The
      # 5-minute gate in auto-rollback consumes DEPLOY_SHA +
      # DEPLOY_TIMESTAMP so stale workflow re-runs cannot revert an
      # unrelated commit. Artifact retention is 1 day (rollback
      # decision must happen long before then).
      # --------------------------------------------------------------
      - name: Record deploy metadata for rollback window
        run: |
          echo "DEPLOY_SHA=${{ github.sha }}" >> deploy_metadata.env
          echo "DEPLOY_TIMESTAMP=$(date -u +%s)" >> deploy_metadata.env

      - name: Upload deploy metadata
        uses: actions/upload-artifact@v4
        with:
          name: deploy-metadata
          path: deploy_metadata.env
          retention-days: 1

  # ------------------------------------------------------------------
  # Frontend: deploy to Vercel
  # ------------------------------------------------------------------
  deploy-frontend:
    runs-on: ubuntu-latest
    needs: quality-gate
    steps:
      - uses: actions/checkout@v4

      - name: Detect changes to web/frontend
        id: changes
        uses: dorny/paths-filter@v3
        with:
          filters: |
            frontend:
              - 'web/frontend/**'

      - name: Skip deploy if no frontend changes
        if: steps.changes.outputs.frontend != 'true' && github.event_name != 'workflow_dispatch'
        run: echo "No web/frontend changes in this push; skipping deploy." && exit 0

      - name: Setup Node.js
        if: steps.changes.outputs.frontend == 'true' || github.event_name == 'workflow_dispatch'
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: web/frontend/package-lock.json

      - name: Install dependencies
        if: steps.changes.outputs.frontend == 'true' || github.event_name == 'workflow_dispatch'
        working-directory: web/frontend
        run: npm ci

      - name: Build
        if: steps.changes.outputs.frontend == 'true' || github.event_name == 'workflow_dispatch'
        working-directory: web/frontend
        env:
          NEXT_PUBLIC_API_URL: ${{ secrets.API_URL }}
        run: npm run build

      - name: Deploy to Vercel
        if: steps.changes.outputs.frontend == 'true' || github.event_name == 'workflow_dispatch'
        uses: amondnet/vercel-action@v25
        with:
          vercel-token: ${{ secrets.VERCEL_TOKEN }}
          vercel-org-id: ${{ secrets.VERCEL_ORG_ID }}
          vercel-project-id: ${{ secrets.VERCEL_PROJECT_ID }}
          working-directory: web/frontend
          vercel-args: --prod

  # ------------------------------------------------------------------
  # Backend: build Docker image and push to ECR
  # ------------------------------------------------------------------
  deploy-backend:
    runs-on: ubuntu-latest
    needs: quality-gate
    steps:
      - uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Login to Amazon ECR
        id: ecr-login
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build, tag, and push Docker image
        env:
          ECR_REGISTRY: ${{ steps.ecr-login.outputs.registry }}
          ECR_REPOSITORY: nfl-data-api
          IMAGE_TAG: ${{ github.sha }}
        run: |
          docker build -f web/Dockerfile -t $ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG .
          docker tag $ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG $ECR_REGISTRY/$ECR_REPOSITORY:latest
          docker push $ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG
          docker push $ECR_REGISTRY/$ECR_REPOSITORY:latest

      - name: Deploy via SAM (Lambda)
        working-directory: web/api/serverless
        run: |
          pip install aws-sam-cli
          sam build
          sam deploy \
            --stack-name nfl-data-api \
            --resolve-s3 \
            --capabilities CAPABILITY_IAM \
            --parameter-overrides \
              DatabaseUrl=${{ secrets.DATABASE_URL }} \
              CorsOrigins=${{ secrets.CORS_ORIGINS }} \
            --no-confirm-changeset \
            --no-fail-on-empty-changeset

  # ------------------------------------------------------------------
  # Live gate (BLOCKING per Plan 68-03 SANITY-08, SANITY-09):
  # Probes the LIVE backend + frontend AFTER deploy with the v2 gate
  # (predictions, lineups, sampled rosters, news content, extractor
  # freshness, roster drift, DQAL-03 carry-overs). Non-zero exit fails
  # this job, fails the workflow, and triggers the auto-rollback job
  # via its `needs: live-gate-blocking` + result==failure trigger.
  #
  # NO `continue-on-error` — failure here is intentional and gates
  # everything downstream including the rollback decision.
  # ------------------------------------------------------------------
  live-gate-blocking:
    name: Live Site Gate (Blocking)
    runs-on: ubuntu-latest
    needs: [deploy-frontend, deploy-backend]
    if: always() && (needs.deploy-frontend.result == 'success' || needs.deploy-backend.result == 'success')
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: requirements.txt

      - name: Install Python dependencies
        run: pip install -r requirements.txt

      # Give Railway/Vercel a moment to serve the new image on the edge.
      # Railway cold-start + router drain can exceed 45s under load.
      - name: Wait for deployments to stabilise
        run: sleep 60

      - name: Run v2 sanity gate against live deployment
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          ENABLE_LLM_ENRICHMENT: ${{ vars.ENABLE_LLM_ENRICHMENT || 'false' }}
        run: |
          python scripts/sanity_check_projections.py \
            --check-live \
            --scoring half_ppr \
            --season 2026
        # Exit code != 0 fails the job, fails the workflow, triggers rollback.
