name: Deploy Web Platform

on:
  push:
    branches: [main]
    paths:
      - "web/**"
      - "src/**"
      - "data/**"
      - ".github/workflows/deploy-web.yml"
  workflow_dispatch:

env:
  AWS_REGION: us-east-2

jobs:
  # ------------------------------------------------------------------
  # Quality Gate: sanity check must pass before any deploy (per D-07)
  # Exit code 1 from sanity_check_projections.py == CRITICAL issues
  # present -> this job fails -> both deploy jobs are blocked via
  # their `needs: quality-gate` dependency. Warnings-only runs exit
  # 0 and allow deploy to proceed.
  # ------------------------------------------------------------------
  quality-gate:
    name: Data Quality Gate
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: requirements.txt

      - name: Install Python dependencies
        run: pip install -r requirements.txt

      - name: Run sanity check
        run: |
          python scripts/sanity_check_projections.py \
            --scoring half_ppr \
            --season 2026
        # Exit code 1 on CRITICAL issues -> blocks deployment

  # ------------------------------------------------------------------
  # Frontend: deploy to Vercel
  # ------------------------------------------------------------------
  deploy-frontend:
    runs-on: ubuntu-latest
    needs: quality-gate
    steps:
      - uses: actions/checkout@v4

      - name: Detect changes to web/frontend
        id: changes
        uses: dorny/paths-filter@v3
        with:
          filters: |
            frontend:
              - 'web/frontend/**'

      - name: Skip deploy if no frontend changes
        if: steps.changes.outputs.frontend != 'true' && github.event_name != 'workflow_dispatch'
        run: echo "No web/frontend changes in this push; skipping deploy." && exit 0

      - name: Setup Node.js
        if: steps.changes.outputs.frontend == 'true' || github.event_name == 'workflow_dispatch'
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: web/frontend/package-lock.json

      - name: Install dependencies
        if: steps.changes.outputs.frontend == 'true' || github.event_name == 'workflow_dispatch'
        working-directory: web/frontend
        run: npm ci

      - name: Build
        if: steps.changes.outputs.frontend == 'true' || github.event_name == 'workflow_dispatch'
        working-directory: web/frontend
        env:
          NEXT_PUBLIC_API_URL: ${{ secrets.API_URL }}
        run: npm run build

      - name: Deploy to Vercel
        if: steps.changes.outputs.frontend == 'true' || github.event_name == 'workflow_dispatch'
        uses: amondnet/vercel-action@v25
        with:
          vercel-token: ${{ secrets.VERCEL_TOKEN }}
          vercel-org-id: ${{ secrets.VERCEL_ORG_ID }}
          vercel-project-id: ${{ secrets.VERCEL_PROJECT_ID }}
          working-directory: web/frontend
          vercel-args: --prod

  # ------------------------------------------------------------------
  # Backend: build Docker image and push to ECR
  # ------------------------------------------------------------------
  deploy-backend:
    runs-on: ubuntu-latest
    needs: quality-gate
    steps:
      - uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Login to Amazon ECR
        id: ecr-login
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build, tag, and push Docker image
        env:
          ECR_REGISTRY: ${{ steps.ecr-login.outputs.registry }}
          ECR_REPOSITORY: nfl-data-api
          IMAGE_TAG: ${{ github.sha }}
        run: |
          docker build -f web/Dockerfile -t $ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG .
          docker tag $ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG $ECR_REGISTRY/$ECR_REPOSITORY:latest
          docker push $ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG
          docker push $ECR_REGISTRY/$ECR_REPOSITORY:latest

      - name: Deploy via SAM (Lambda)
        working-directory: web/api/serverless
        run: |
          pip install aws-sam-cli
          sam build
          sam deploy \
            --stack-name nfl-data-api \
            --resolve-s3 \
            --capabilities CAPABILITY_IAM \
            --parameter-overrides \
              DatabaseUrl=${{ secrets.DATABASE_URL }} \
              CorsOrigins=${{ secrets.CORS_ORIGINS }} \
            --no-confirm-changeset \
            --no-fail-on-empty-changeset

  # ------------------------------------------------------------------
  # Post-deploy smoke gate: probes the LIVE backend + frontend AFTER
  # deploy to catch deploy-only breakage (missing prod deps, broken
  # client-bundle boot, stale cache, etc.). Fails the workflow if
  # CRITICAL issues surface so rollback/investigation is triggered.
  # ------------------------------------------------------------------
  post-deploy-smoke:
    name: Post-Deploy Smoke Test
    runs-on: ubuntu-latest
    needs: [deploy-frontend, deploy-backend]
    if: always() && (needs.deploy-frontend.result == 'success' || needs.deploy-backend.result == 'success')
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: requirements.txt

      - name: Install Python dependencies
        run: pip install requests

      # Give Railway/Vercel a moment to serve the new image on the edge.
      - name: Wait for deployments to stabilise
        run: sleep 45

      - name: Smoke-test live site
        run: |
          python scripts/sanity_check_projections.py \
            --check-live \
            --scoring half_ppr \
            --season 2026
        # Exit code 1 on CRITICAL live issues -> surfaces in the run summary
