name: Deploy Web Platform

on:
  push:
    branches: [main]
    paths:
      - "web/**"
      - "src/**"
      - "data/**"
      - ".github/workflows/deploy-web.yml"
  workflow_dispatch:

env:
  AWS_REGION: us-east-2

# ----------------------------------------------------------------
# Permissions: contents: write enables auto-rollback (Plan 68-03 SANITY-09)
# to git revert + push from the rollback job. NEVER use force-push to main.
# ----------------------------------------------------------------
permissions:
  contents: write
  actions: read

jobs:
  # ------------------------------------------------------------------
  # Quality Gate: sanity check must pass before any deploy (per D-07)
  # Exit code 1 from sanity_check_projections.py == CRITICAL issues
  # present -> this job fails -> both deploy jobs are blocked via
  # their `needs: quality-gate` dependency. Warnings-only runs exit
  # 0 and allow deploy to proceed.
  # ------------------------------------------------------------------
  quality-gate:
    name: Data Quality Gate
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: requirements.txt

      - name: Install Python dependencies
        run: pip install -r requirements.txt

      - name: Run sanity check
        run: |
          python scripts/sanity_check_projections.py \
            --scoring half_ppr \
            --season 2026
        # Exit code 1 on CRITICAL issues -> blocks deployment

      # --------------------------------------------------------------
      # Capture deploy metadata for the rollback window check. The
      # 5-minute gate in auto-rollback consumes DEPLOY_SHA +
      # DEPLOY_TIMESTAMP so stale workflow re-runs cannot revert an
      # unrelated commit. Artifact retention is 1 day (rollback
      # decision must happen long before then).
      # --------------------------------------------------------------
      - name: Record deploy metadata for rollback window
        run: |
          echo "DEPLOY_SHA=${{ github.sha }}" >> deploy_metadata.env
          echo "DEPLOY_TIMESTAMP=$(date -u +%s)" >> deploy_metadata.env

      - name: Upload deploy metadata
        uses: actions/upload-artifact@v4
        with:
          name: deploy-metadata
          path: deploy_metadata.env
          retention-days: 1

  # ------------------------------------------------------------------
  # Frontend deploy: Vercel auto-deploys https://frontend-jet-seven-33.vercel.app
  # from the main branch via its own GitHub webhook (independent of GHA).
  # The previous amondnet/vercel-action@v25 path was dead infra — VERCEL_TOKEN
  # was never set as a repo secret and every workflow_dispatch run failed with
  # "Input required and not supplied: vercel-token", yet the site was always
  # current because Vercel's native integration handled the deploy.
  #
  # Mirrors the deploy-backend (Railway) pattern: keep this job as a no-op so
  # the live-gate-blocking job's `needs: deploy-frontend` resolves, and wait
  # ~120s for Vercel's webhook deploy to settle before the live gate probes.
  # ------------------------------------------------------------------
  deploy-frontend:
    name: Wait for Vercel auto-deploy
    runs-on: ubuntu-latest
    needs: quality-gate
    steps:
      - name: Capture pre-sleep Vercel deploy id
        id: pre
        run: |
          # Vercel exposes a per-deployment id via x-vercel-id (format: "iad1::iad1::abc-...").
          # We capture the deploy fingerprint BEFORE the wait so we can confirm Vercel
          # actually rolled to a new build during the wait window. This guards against
          # the same silent-webhook-freeze failure mode that froze Railway for 3 weeks.
          BEFORE=$(curl -sI https://frontend-jet-seven-33.vercel.app/ | grep -i '^x-vercel-id:' | tr -d '\r' | awk '{print $2}')
          echo "Pre-sleep x-vercel-id: $BEFORE"
          echo "before=$BEFORE" >> $GITHUB_OUTPUT

      - name: Wait for Vercel webhook to redeploy
        run: |
          echo "Vercel auto-deploys https://frontend-jet-seven-33.vercel.app"
          echo "from the main branch via its own GitHub webhook (no GHA action needed)."
          echo "Sleeping 120s to let the new build start serving before live-gate probes."
          sleep 120
          echo "Vercel should be serving the new commit by now."

      - name: Verify Vercel served a new deploy
        run: |
          # The x-vercel-id changes per-edge-cache-fill, so it MAY drift even without
          # a new deploy. We treat an unchanged id as a WARNING (not a hard fail)
          # because a healthy deploy can produce the same id if cache stays warm.
          # The hard check is: response is 200 AND served by Vercel. The id-change
          # is a secondary signal logged for forensic value.
          BEFORE="${{ steps.pre.outputs.before }}"
          AFTER=$(curl -sI https://frontend-jet-seven-33.vercel.app/ | grep -i '^x-vercel-id:' | tr -d '\r' | awk '{print $2}')
          STATUS=$(curl -s -o /dev/null -w "%{http_code}" https://frontend-jet-seven-33.vercel.app/)
          echo "Pre-sleep x-vercel-id:  $BEFORE"
          echo "Post-sleep x-vercel-id: $AFTER"
          echo "Frontend root status:   $STATUS"
          if [ "$STATUS" != "200" ] && [ "$STATUS" != "307" ]; then
            echo "::error::Vercel root returned $STATUS — frontend is unreachable"
            exit 1
          fi
          if [ "$BEFORE" = "$AFTER" ]; then
            echo "::warning::x-vercel-id unchanged across the 120s wait. Possible Vercel webhook freeze (same failure mode that hit Railway). Live gate will probe; if it passes, Vercel served the new build from a warm cache. If the gate fails on stale content, escalate to Vercel dashboard."
          else
            echo "x-vercel-id changed — Vercel served a new edge fill within the wait window."
          fi

  # ------------------------------------------------------------------
  # Backend: build Docker image and push to ECR
  # ------------------------------------------------------------------
  # ------------------------------------------------------------------
  # Backend deploy: Railway auto-deploys from main via its own GitHub
  # webhook (independent of GHA). The previous AWS Lambda / ECR / SAM
  # path is dead infrastructure — AWS credentials expired March 2026
  # and the production backend has been on Railway since v3.2.
  # We keep this job as a no-op so the live-gate-blocking job's
  # `needs: deploy-backend` dependency still resolves, and we wait
  # ~120s for Railway's webhook deploy to settle before the live gate
  # probes Railway endpoints.
  # ------------------------------------------------------------------
  deploy-backend:
    name: Wait for Railway auto-deploy
    runs-on: ubuntu-latest
    needs: quality-gate
    steps:
      - name: Wait for Railway webhook to redeploy
        run: |
          echo "Railway auto-deploys https://nfldataengineering-production.up.railway.app"
          echo "from the main branch via its own GitHub webhook (no GHA action needed)."
          echo "Sleeping 120s to let the new image start serving before live-gate probes."
          sleep 120
          echo "Railway should be serving the new commit by now."

  # ------------------------------------------------------------------
  # Live gate (BLOCKING per Plan 68-03 SANITY-08, SANITY-09):
  # Probes the LIVE backend + frontend AFTER deploy with the v2 gate
  # (predictions, lineups, sampled rosters, news content, extractor
  # freshness, roster drift, DQAL-03 carry-overs). Non-zero exit fails
  # this job, fails the workflow, and triggers the auto-rollback job
  # via its `needs: live-gate-blocking` + result==failure trigger.
  #
  # NO `continue-on-error` — failure here is intentional and gates
  # everything downstream including the rollback decision.
  # ------------------------------------------------------------------
  live-gate-blocking:
    name: Live Site Gate (Blocking)
    runs-on: ubuntu-latest
    needs: [deploy-frontend, deploy-backend]
    if: always() && (needs.deploy-frontend.result == 'success' || needs.deploy-backend.result == 'success')
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: requirements.txt

      - name: Install Python dependencies
        run: pip install -r requirements.txt

      # Give Railway/Vercel a moment to serve the new image on the edge.
      # Railway cold-start + router drain can exceed 45s under load.
      - name: Wait for deployments to stabilise
        run: sleep 60

      - name: Run v2 sanity gate against live deployment
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          ENABLE_LLM_ENRICHMENT: ${{ vars.ENABLE_LLM_ENRICHMENT || 'false' }}
        run: |
          python scripts/sanity_check_projections.py \
            --check-live \
            --scoring half_ppr \
            --season 2026
        # Exit code != 0 fails the job, fails the workflow, triggers rollback.

  # ------------------------------------------------------------------
  # Auto-rollback (Plan 68-03 SANITY-09):
  # Triggers ONLY when live-gate-blocking fails AND the failing commit
  # is within 5 minutes of workflow start. Reverts HEAD with
  # `git revert --no-edit` and pushes to main. Railway auto-redeploys
  # the previous green commit on push. Revert commit message is:
  #   `revert: auto-rollback after sanity-check failure on <sha>`
  # so git log --oneline makes rollbacks auditable.
  #
  # NEVER force-push. NEVER bypass branch protection. The bot token
  # has contents:write only (configured at workflow root).
  # ------------------------------------------------------------------
  auto-rollback:
    name: Auto-Rollback on Live Gate Failure
    runs-on: ubuntu-latest
    needs: live-gate-blocking
    if: always() && needs.live-gate-blocking.result == 'failure'
    steps:
      - name: Checkout main
        uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 2
          # Use GITHUB_TOKEN (contents:write at workflow root)
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Download deploy metadata
        uses: actions/download-artifact@v4
        with:
          name: deploy-metadata

      - name: Verify 5-minute rollback window
        id: window_check
        run: |
          source deploy_metadata.env
          NOW=$(date -u +%s)
          ELAPSED=$(( NOW - DEPLOY_TIMESTAMP ))
          echo "DEPLOY_SHA=$DEPLOY_SHA"
          echo "Elapsed since deploy: ${ELAPSED}s"
          if [ "$ELAPSED" -gt 300 ]; then
            echo "ROLLBACK_SKIPPED=true" >> $GITHUB_OUTPUT
            echo "::warning::Rollback skipped — ${ELAPSED}s since deploy exceeds 5-minute window. Manual review required."
            exit 0
          fi
          echo "ROLLBACK_SKIPPED=false" >> $GITHUB_OUTPUT
          echo "deploy_sha=$DEPLOY_SHA" >> $GITHUB_OUTPUT

      - name: Configure git bot identity
        if: steps.window_check.outputs.ROLLBACK_SKIPPED != 'true'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

      - name: Revert failing deploy commit
        if: steps.window_check.outputs.ROLLBACK_SKIPPED != 'true'
        run: |
          SHA="${{ steps.window_check.outputs.deploy_sha }}"
          # HEAD on main should equal SHA since we just deployed it. Guard anyway.
          CURRENT_HEAD=$(git rev-parse HEAD)
          if [ "$CURRENT_HEAD" != "$SHA" ]; then
            echo "::error::HEAD ($CURRENT_HEAD) no longer matches deploy SHA ($SHA). Skipping rollback — someone else pushed. Manual review required."
            exit 1
          fi
          # TD-01 (Phase 75): single revert + commit with audit message.
          # No amend; pre-commit hooks now run on the rollback commit too.
          git revert --no-commit HEAD
          git commit -m "revert: auto-rollback after sanity-check failure on ${SHA}"

      - name: Push rollback to main
        if: steps.window_check.outputs.ROLLBACK_SKIPPED != 'true'
        run: |
          # Non-force push. Branch protection rules still apply.
          # If push is rejected (e.g., new commit raced us), surface as failure.
          git push origin main

      - name: Record rollback outcome
        if: always() && steps.window_check.outputs.ROLLBACK_SKIPPED != 'true'
        run: |
          echo "## Auto-Rollback Executed" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "Reverted commit: ${{ steps.window_check.outputs.deploy_sha }}" >> $GITHUB_STEP_SUMMARY
          echo "Railway will auto-redeploy the previous green commit." >> $GITHUB_STEP_SUMMARY
          echo "Review the live-gate-blocking failure before re-deploying." >> $GITHUB_STEP_SUMMARY
