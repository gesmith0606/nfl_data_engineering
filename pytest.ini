[pytest]
# Per-test watchdog: the full suite hung indefinitely on 2026-06-10 (a test
# blocked on network I/O in full-suite runs only — modules pass individually).
# pytest-timeout converts any hang into a named failure with a traceback so
# the suite always terminates and the culprit is identified.
timeout = 300
timeout_method = thread

# Custom marks — registered to avoid PytestUnknownMarkWarning.
markers =
    integration: marks tests that require real local data files (deselect with -m "not integration")
    network: marks tests that make live network calls (excluded from /test by default)
