[pytest]
# Per-test watchdog: the full suite hung indefinitely on 2026-06-10 (a test
# blocked on network I/O in full-suite runs only — modules pass individually).
# pytest-timeout converts any hang into a named failure with a traceback so
# the suite always terminates and the culprit is identified.
timeout = 300
timeout_method = thread

# Only collect from tests/ — scripts/experiments/ contains test_*-named
# operational probes (live AWS/S3 calls, real side effects) that must not
# run as part of the deterministic suite.
testpaths = tests

# Warning policy: the CI backend-tests job enforces a warning-count budget so
# new warnings are visible instead of drowning (the suite once emitted 12k).
# Only third-party warnings we cannot fix are filtered here — never blanket-
# ignore categories, and remove entries when the underlying dep is upgraded.
filterwarnings =
    # pandas<2.1 internals call np.find_common_type (deprecated numpy 1.25).
    # ~11.9k occurrences, all from venv/pandas — drop after a pandas upgrade.
    ignore:np.find_common_type is deprecated:DeprecationWarning

# Custom marks — registered to avoid PytestUnknownMarkWarning.
markers =
    unit: fast isolated unit tests with no real I/O (network mocked)
    integration: marks tests that require real local data files (deselect with -m "not integration")
    network: marks tests that make live network calls (excluded from /test by default)
