AWSTemplateFormatVersion: "2010-09-09"
Transform: AWS::Serverless-2016-10-31
Description: NFL Data Engineering API -- FastAPI on Lambda via Mangum

Globals:
  Function:
    Timeout: 30
    MemorySize: 512
    Runtime: python3.9

Parameters:
  DatabaseUrl:
    Type: String
    Description: PostgreSQL connection string (Supabase)
    NoEcho: true
  CorsOrigins:
    Type: String
    Default: "https://your-domain.vercel.app"
    Description: Comma-separated allowed CORS origins

Resources:
  NflApiFunction:
    Type: AWS::Serverless::Function
    Properties:
      Handler: handler.handler
      CodeUri: .
      Description: FastAPI application served via Mangum
      Environment:
        Variables:
          DATABASE_URL: !Ref DatabaseUrl
          CORS_ORIGINS: !Ref CorsOrigins
      Events:
        ApiCatchAll:
          Type: HttpApi
          Properties:
            Path: /{proxy+}
            Method: ANY

Outputs:
  ApiUrl:
    Description: API Gateway URL
    Value: !Sub "https://${ServerlessHttpApi}.execute-api.${AWS::Region}.amazonaws.com"
