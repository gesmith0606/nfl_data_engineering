  <text x="410" y="163" font-size="8.5" fill="#666">Player usage/advanced</text>
  <text x="410" y="176" font-size="8.5" fill="#666">Player historical/quality</text>
  <text x="410" y="189" font-size="8.5" fill="#666">Team PBP metrics</text>
  <text x="410" y="202" font-size="8.5" fill="#666">Team tendencies/SOS</text>
  <text x="410" y="215" font-size="8.5" fill="#666">Team situational splits</text>
  <text x="410" y="228" font-size="8.5" fill="#666">Game context/referee</text>
