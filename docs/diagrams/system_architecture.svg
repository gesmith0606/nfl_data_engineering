  <text x="605" y="176" font-size="8.5" fill="#666">PPR / Half-PPR / Standard</text>
  <text x="605" y="189" font-size="8.5" fill="#666">Floor/ceiling intervals</text>

  <rect x="605" y="201" width="145" height="1" fill="#DAA520" fill-opacity="0.3"/>
