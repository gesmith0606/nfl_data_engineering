  <!-- Col 1 -->
  <rect x="40" y="572" width="12" height="12" rx="2" fill="#CD7F32"/>
  <text x="58" y="583" font-size="10" fill="#555">Bronze: 16 data types, 517+ Parquet files, 93 MB</text>
  <rect x="40" y="596" width="12" height="12" rx="2" fill="#A0A0A0"/>
  <text x="58" y="607" font-size="10" fill="#555">Silver: 14 paths, 310+ features, 66 graph features</text>
