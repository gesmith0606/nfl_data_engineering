  <text x="605" y="247" font-size="8.5" fill="#666">ATS edges, O/U, CLV</text>

  <rect x="605" y="259" width="145" height="1" fill="#DAA520" fill-opacity="0.3"/>
  <text x="605" y="277" font-size="9" fill="#555">ML Models</text>
  <text x="605" y="292" font-size="8.5" fill="#666">QB/RB: XGBoost SHIP</text>
  <text x="605" y="305" font-size="8.5" fill="#666">WR/TE: Ridge 60f hybrid</text>

  <rect x="605" y="317" width="145" height="1" fill="#DAA520" fill-opacity="0.3"/>
  <text x="605" y="335" font-size="9" fill="#555">Sentiment Gold</text>
  <text x="605" y="350" font-size="8.5" fill="#666">Player alerts, signals</text>

  <text x="677" y="410" text-anchor="middle" font-size="9" font-weight="600" fill="#8B7500">Parquet output</text>

  <!-- API (Railway) -->
  <rect x="790" y="80" width="165" height="250" rx="10" fill="#4A90D9" fill-opacity="0.07" stroke="#4A90D9" stroke-width="1.5"/>
  <rect x="790" y="80" width="165" height="26" rx="10" fill="#4A90D9"/>
  <rect x="790" y="96" width="165" height="10" fill="#4A90D9"/>
  <text x="872" y="98" text-anchor="middle" font-size="12" font-weight="700" fill="#fff">FastAPI</text>
  <text x="872" y="125" text-anchor="middle" font-size="9" fill="#2C5F8A">Railway deployment</text>

  <text x="800" y="148" font-size="9" fill="#555">23 endpoints:</text>
  <text x="800" y="163" font-size="8.5" fill="#666">Projections (weekly/pre)</text>
