  <!-- Title -->
  <text x="600" y="38" text-anchor="middle" font-size="20" font-weight="700" fill="#1a1a2e">NFL Data Engineering — System Architecture</text>
  <text x="600" y="58" text-anchor="middle" font-size="12" fill="#666">v4.1 Medallion Architecture with AI Advisor</text>

  <!-- DATA SOURCES (left column) -->
  <rect x="20" y="80" width="155" height="420" rx="10" fill="#f8f9fa" stroke="#dee2e6" stroke-width="1"/>
  <text x="97" y="102" text-anchor="middle" font-size="11" font-weight="700" fill="#495057">DATA SOURCES</text>

  <rect x="30" y="112" width="135" height="34" rx="6" fill="#fff" stroke="#dee2e6" stroke-width="1" filter="url(#shadow)"/>
  <text x="97" y="133" text-anchor="middle" font-size="10" font-weight="600" fill="#333">nfl-data-py</text>

  <rect x="30" y="154" width="135" height="34" rx="6" fill="#fff" stroke="#dee2e6" stroke-width="1" filter="url(#shadow)"/>
  <text x="97" y="175" text-anchor="middle" font-size="10" font-weight="600" fill="#333">Sleeper API</text>

  <rect x="30" y="196" width="135" height="34" rx="6" fill="#fff" stroke="#dee2e6" stroke-width="1" filter="url(#shadow)"/>
  <text x="97" y="217" text-anchor="middle" font-size="10" font-weight="600" fill="#333">FinnedAI Odds</text>

  <rect x="30" y="238" width="135" height="34" rx="6" fill="#fff" stroke="#dee2e6" stroke-width="1" filter="url(#shadow)"/>
  <text x="97" y="259" text-anchor="middle" font-size="10" font-weight="600" fill="#333">RSS Feeds (5)</text>

  <rect x="30" y="280" width="135" height="34" rx="6" fill="#fff" stroke="#dee2e6" stroke-width="1" filter="url(#shadow)"/>
  <text x="97" y="301" text-anchor="middle" font-size="10" font-weight="600" fill="#333">Reddit</text>

  <rect x="30" y="322" width="135" height="34" rx="6" fill="#fff" stroke="#dee2e6" stroke-width="1" filter="url(#shadow)"/>
  <text x="97" y="343" text-anchor="middle" font-size="10" font-weight="600" fill="#333">ESPN</text>

  <rect x="30" y="364" width="135" height="34" rx="6" fill="#fff" stroke="#dee2e6" stroke-width="1" filter="url(#shadow)"/>
  <text x="97" y="385" text-anchor="middle" font-size="10" font-weight="600" fill="#333">FantasyPros</text>

  <rect x="30" y="406" width="135" height="34" rx="6" fill="#fff" stroke="#dee2e6" stroke-width="1" filter="url(#shadow)"/>
  <text x="97" y="427" text-anchor="middle" font-size="10" font-weight="600" fill="#333">CFBD (College)</text>

  <rect x="30" y="448" width="135" height="34" rx="6" fill="#fff" stroke="#dee2e6" stroke-width="1" filter="url(#shadow)"/>
  <text x="97" y="469" text-anchor="middle" font-size="10" font-weight="600" fill="#333">Sleeper Trending</text>

