  <text x="410" y="284" font-size="9" fill="#555">Graph features (66)</text>
  <text x="410" y="299" font-size="8.5" fill="#666">WR-CB, RB-LB, TE-Safety,</text>
  <text x="410" y="312" font-size="8.5" fill="#666">QB-WR chemistry, OL,</text>
  <text x="410" y="325" font-size="8.5" fill="#666">red zone, game script</text>

  <rect x="410" y="337" width="145" height="1" fill="#A0A0A0" fill-opacity="0.3"/>
  <text x="410" y="355" font-size="9" fill="#555">Sentiment signals</text>
  <text x="410" y="370" font-size="8.5" fill="#666">Weekly aggregation</text>

