  <text x="995" y="163" font-size="8.5" fill="#666">getProjections, getPlayers</text>
  <text x="995" y="176" font-size="8.5" fill="#666">comparePlayers, getLineup</text>
  <text x="995" y="189" font-size="8.5" fill="#666">getGamePredictions</text>
  <text x="995" y="202" font-size="8.5" fill="#666">getPlayerHistory, getNews</text>
  <text x="995" y="215" font-size="8.5" fill="#666">getCollegeProspects ...</text>

