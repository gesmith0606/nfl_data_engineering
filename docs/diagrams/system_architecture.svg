  <rect x="205" y="80" width="165" height="420" rx="10" fill="#CD7F32" fill-opacity="0.07" stroke="#CD7F32" stroke-width="1.5"/>
  <rect x="205" y="80" width="165" height="26" rx="10" fill="#CD7F32"/>
  <rect x="205" y="96" width="165" height="10" fill="#CD7F32"/>
  <text x="287" y="98" text-anchor="middle" font-size="12" font-weight="700" fill="#fff">BRONZE</text>
  <text x="287" y="125" text-anchor="middle" font-size="9" fill="#8B6914">s3://nfl-raw/</text>

  <text x="215" y="148" font-size="9" fill="#555">16 data types:</text>
  <text x="215" y="163" font-size="8.5" fill="#666">PBP (140 cols), schedules,</text>
  <text x="215" y="176" font-size="8.5" fill="#666">player weekly/seasonal,</text>
  <text x="215" y="189" font-size="8.5" fill="#666">snap counts, injuries,</text>
  <text x="215" y="202" font-size="8.5" fill="#666">rosters, NGS, PFR, QBR,</text>
  <text x="215" y="215" font-size="8.5" fill="#666">depth charts, draft picks,</text>
  <text x="215" y="228" font-size="8.5" fill="#666">combine, officials, teams</text>

  <rect x="215" y="240" width="145" height="1" fill="#CD7F32" fill-opacity="0.3"/>
  <text x="215" y="258" font-size="9" fill="#555">Odds (2016-2021)</text>
  <text x="215" y="273" font-size="8.5" fill="#666">FinnedAI JSON to Parquet</text>

