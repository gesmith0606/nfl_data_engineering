  <text x="215" y="348" font-size="9" fill="#555">Sentiment articles</text>
  <text x="215" y="363" font-size="8.5" fill="#666">RSS, Reddit, Sleeper</text>

  <text x="287" y="395" text-anchor="middle" font-size="9" font-weight="600" fill="#8B6914">Parquet partitioned</text>
  <text x="287" y="410" text-anchor="middle" font-size="8.5" fill="#8B6914">season=YYYY/week=WW</text>

  <!-- SILVER -->
  <rect x="400" y="80" width="165" height="420" rx="10" fill="#C0C0C0" fill-opacity="0.10" stroke="#A0A0A0" stroke-width="1.5"/>
  <rect x="400" y="80" width="165" height="26" rx="10" fill="#A0A0A0"/>
  <rect x="400" y="96" width="165" height="10" fill="#A0A0A0"/>
