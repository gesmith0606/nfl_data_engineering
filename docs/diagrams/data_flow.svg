<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 800" width="1200" height="800" font-family="Inter, -apple-system, Segoe UI, Helvetica, Arial, sans-serif">
  <defs>
    <filter id="shadow" x="-4%" y="-4%" width="108%" height="112%">
      <feDropShadow dx="0" dy="2" stdDeviation="3" flood-opacity="0.12"/>
    </filter>
    <marker id="arr-bronze" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#CD7F32"/>
    </marker>
    <marker id="arr-silver" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#888"/>
    </marker>
    <marker id="arr-gold" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#DAA520"/>
    </marker>
    <marker id="arr-api" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#4A90D9"/>
    </marker>
    <marker id="arr-fe" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#50C878"/>
    </marker>
    <marker id="arr-cron" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#24292e"/>
    </marker>
    <linearGradient id="bg-flow" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#fafbfc"/>
      <stop offset="100%" stop-color="#f0f2f5"/>
    </linearGradient>
  </defs>

  <rect width="1200" height="800" fill="url(#bg-flow)"/>

  <!-- Title -->
  <text x="600" y="38" text-anchor="middle" font-size="20" font-weight="700" fill="#1a1a2e">Medallion Data Flow Pipeline</text>
  <text x="600" y="58" text-anchor="middle" font-size="12" fill="#666">Bronze Ingestion to Silver Transformation to Gold Generation to API Serving</text>

  <!-- STEP 1: BRONZE INGESTION -->
  <rect x="30" y="85" width="175" height="370" rx="12" fill="#CD7F32" fill-opacity="0.08" stroke="#CD7F32" stroke-width="2" filter="url(#shadow)"/>
  <rect x="30" y="85" width="175" height="32" rx="12" fill="#CD7F32"/>
  <rect x="30" y="105" width="175" height="12" fill="#CD7F32"/>
  <text x="117" y="106" text-anchor="middle" font-size="13" font-weight="700" fill="#fff">1. Bronze Ingestion</text>

  <text x="45" y="140" font-size="10" font-weight="600" fill="#8B6914">Scripts:</text>
  <text x="45" y="157" font-size="9" fill="#666">bronze_ingestion_simple.py</text>
  <text x="45" y="172" font-size="9" fill="#666">bronze_odds_ingestion.py</text>
  <text x="45" y="187" font-size="9" fill="#666">bronze_college_ingestion.py</text>
  <text x="45" y="202" font-size="9" fill="#666">ingest_sentiment_rss.py</text>
  <text x="45" y="217" font-size="9" fill="#666">ingest_sentiment_sleeper.py</text>

  <rect x="45" y="230" width="145" height="1" fill="#CD7F32" fill-opacity="0.3"/>

  <text x="45" y="250" font-size="10" font-weight="600" fill="#8B6914">Output:</text>
  <text x="45" y="267" font-size="9" fill="#666">16 data types to Parquet</text>
  <text x="45" y="282" font-size="9" fill="#666">Partitioned: season/week</text>
  <text x="45" y="297" font-size="9" fill="#666">517+ files, 93 MB total</text>

  <rect x="45" y="310" width="145" height="1" fill="#CD7F32" fill-opacity="0.3"/>

  <text x="45" y="330" font-size="10" font-weight="600" fill="#8B6914">Sources:</text>
  <text x="45" y="347" font-size="9" fill="#666">nfl-data-py (nflverse)</text>
  <text x="45" y="362" font-size="9" fill="#666">Sleeper API (ADP/rosters)</text>
  <text x="45" y="377" font-size="9" fill="#666">FinnedAI (odds JSON)</text>
  <text x="45" y="392" font-size="9" fill="#666">CFBD API (college)</text>
  <text x="45" y="407" font-size="9" fill="#666">RSS/Reddit (sentiment)</text>

  <rect x="55" y="420" width="135" height="24" rx="6" fill="#CD7F32" fill-opacity="0.15" stroke="#CD7F32" stroke-width="1"/>
  <text x="122" y="436" text-anchor="middle" font-size="9" font-weight="600" fill="#8B6914">s3://nfl-raw/</text>

  <!-- Arrow 1 to 2 -->
  <line x1="210" y1="270" x2="245" y2="270" stroke="#CD7F32" stroke-width="2.5" marker-end="url(#arr-bronze)"/>

  <!-- STEP 2: SILVER TRANSFORMATION -->
  <rect x="250" y="85" width="185" height="370" rx="12" fill="#C0C0C0" fill-opacity="0.10" stroke="#999" stroke-width="2" filter="url(#shadow)"/>
  <rect x="250" y="85" width="185" height="32" rx="12" fill="#999"/>
  <rect x="250" y="105" width="185" height="12" fill="#999"/>
  <text x="342" y="106" text-anchor="middle" font-size="13" font-weight="700" fill="#fff">2. Silver Transform</text>

  <text x="265" y="140" font-size="10" font-weight="600" fill="#666">Scripts:</text>
  <text x="265" y="157" font-size="9" fill="#666">silver_player_transformation.py</text>
  <text x="265" y="172" font-size="9" fill="#666">silver_team_transformation.py</text>
  <text x="265" y="187" font-size="9" fill="#666">silver_market_transformation.py</text>
  <text x="265" y="202" font-size="9" fill="#666">silver_player_quality_trans.py</text>
  <text x="265" y="217" font-size="9" fill="#666">compute_graph_features.py</text>
  <text x="265" y="232" font-size="9" fill="#666">process_sentiment.py</text>

  <rect x="265" y="245" width="155" height="1" fill="#999" fill-opacity="0.3"/>

  <text x="265" y="265" font-size="10" font-weight="600" fill="#666">Output (14 paths):</text>
  <text x="265" y="282" font-size="9" fill="#666">Player: usage, advanced, history</text>
  <text x="265" y="297" font-size="9" fill="#666">Team: PBP, tendencies, SOS</text>
  <text x="265" y="312" font-size="9" fill="#666">Context: game, referee, playoff</text>
  <text x="265" y="327" font-size="9" fill="#666">Market: line movement (2016-21)</text>
  <text x="265" y="342" font-size="9" fill="#666">Graph: 66 features from PBP</text>
  <text x="265" y="357" font-size="9" fill="#666">Sentiment: weekly aggregation</text>

  <rect x="265" y="370" width="155" height="1" fill="#999" fill-opacity="0.3"/>

  <text x="265" y="390" font-size="10" font-weight="600" fill="#666">Feature vector: 310+ cols</text>
  <text x="265" y="407" font-size="9" fill="#666">Rolling avgs, multipliers</text>

  <rect x="270" y="420" width="145" height="24" rx="6" fill="#C0C0C0" fill-opacity="0.15" stroke="#999" stroke-width="1"/>
  <text x="342" y="436" text-anchor="middle" font-size="9" font-weight="600" fill="#666">s3://nfl-refined/</text>

  <!-- Arrow 2 to 3 -->
  <line x1="440" y1="270" x2="475" y2="270" stroke="#888" stroke-width="2.5" marker-end="url(#arr-silver)"/>

  <!-- STEP 3: GOLD GENERATION -->
  <rect x="480" y="85" width="185" height="370" rx="12" fill="#FFD700" fill-opacity="0.08" stroke="#DAA520" stroke-width="2" filter="url(#shadow)"/>
  <rect x="480" y="85" width="185" height="32" rx="12" fill="#DAA520"/>
  <rect x="480" y="105" width="185" height="12" fill="#DAA520"/>
  <text x="572" y="106" text-anchor="middle" font-size="13" font-weight="700" fill="#fff">3. Gold Generation</text>

  <text x="495" y="140" font-size="10" font-weight="600" fill="#8B7500">Fantasy Projections:</text>
  <text x="495" y="157" font-size="9" fill="#666">generate_projections.py</text>
  <text x="495" y="172" font-size="9" fill="#666">619 players, 3 scoring modes</text>
  <text x="495" y="187" font-size="9" fill="#666">Hybrid heuristic + ML residuals</text>

  <rect x="495" y="200" width="155" height="1" fill="#DAA520" fill-opacity="0.3"/>

  <text x="495" y="220" font-size="10" font-weight="600" fill="#8B7500">Game Predictions:</text>
  <text x="495" y="237" font-size="9" fill="#666">generate_predictions.py</text>
  <text x="495" y="252" font-size="9" fill="#666">4-model ensemble (53% ATS)</text>
  <text x="495" y="267" font-size="9" fill="#666">Edge detection vs Vegas</text>

  <rect x="495" y="280" width="155" height="1" fill="#DAA520" fill-opacity="0.3"/>

  <text x="495" y="300" font-size="10" font-weight="600" fill="#8B7500">ML Training:</text>
  <text x="495" y="317" font-size="9" fill="#666">train_player_models.py</text>
  <text x="495" y="332" font-size="9" fill="#666">train_ensemble.py</text>
  <text x="495" y="347" font-size="9" fill="#666">train_residual_models.py</text>

  <rect x="495" y="360" width="155" height="1" fill="#DAA520" fill-opacity="0.3"/>

  <text x="495" y="380" font-size="10" font-weight="600" fill="#8B7500">Draft Tools:</text>
  <text x="495" y="397" font-size="9" fill="#666">draft_assistant.py (VORP)</text>
  <text x="495" y="412" font-size="9" fill="#666">Snake, auction, simulation</text>

  <rect x="500" y="420" width="145" height="24" rx="6" fill="#FFD700" fill-opacity="0.15" stroke="#DAA520" stroke-width="1"/>
  <text x="572" y="436" text-anchor="middle" font-size="9" font-weight="600" fill="#8B7500">s3://nfl-trusted/</text>

  <!-- Arrow 3 to 4 -->
  <line x1="670" y1="270" x2="705" y2="270" stroke="#DAA520" stroke-width="2.5" marker-end="url(#arr-gold)"/>

  <!-- STEP 4: API SERVING -->
  <rect x="710" y="85" width="175" height="370" rx="12" fill="#4A90D9" fill-opacity="0.07" stroke="#4A90D9" stroke-width="2" filter="url(#shadow)"/>
  <rect x="710" y="85" width="175" height="32" rx="12" fill="#4A90D9"/>
  <rect x="710" y="105" width="175" height="12" fill="#4A90D9"/>
  <text x="797" y="106" text-anchor="middle" font-size="13" font-weight="700" fill="#fff">4. API Serving</text>

  <text x="725" y="140" font-size="10" font-weight="600" fill="#2C5F8A">FastAPI on Railway:</text>
  <text x="725" y="157" font-size="9" fill="#666">web/api/main.py</text>
  <text x="725" y="172" font-size="9" fill="#666">23 endpoints, CORS enabled</text>

  <rect x="725" y="185" width="145" height="1" fill="#4A90D9" fill-opacity="0.3"/>

  <text x="725" y="205" font-size="10" font-weight="600" fill="#2C5F8A">Routers:</text>
  <text x="725" y="222" font-size="9" fill="#666">projections.py (weekly/pre)</text>
  <text x="725" y="237" font-size="9" fill="#666">predictions.py (edges/CLV)</text>
  <text x="725" y="252" font-size="9" fill="#666">players.py (history/matchup)</text>
  <text x="725" y="267" font-size="9" fill="#666">lineups.py (optimal)</text>
  <text x="725" y="282" font-size="9" fill="#666">games.py (archive/results)</text>
  <text x="725" y="297" font-size="9" fill="#666">college.py (prospects)</text>
  <text x="725" y="312" font-size="9" fill="#666">news.py (sentiment)</text>

  <rect x="725" y="325" width="145" height="1" fill="#4A90D9" fill-opacity="0.3"/>

  <text x="725" y="345" font-size="10" font-weight="600" fill="#2C5F8A">Services:</text>
  <text x="725" y="362" font-size="9" fill="#666">projection_service.py</text>
  <text x="725" y="377" font-size="9" fill="#666">prediction_service.py</text>
  <text x="725" y="392" font-size="9" fill="#666">news_service.py</text>

  <rect x="720" y="420" width="155" height="24" rx="6" fill="#4A90D9" fill-opacity="0.15" stroke="#4A90D9" stroke-width="1"/>
  <text x="797" y="436" text-anchor="middle" font-size="9" font-weight="600" fill="#2C5F8A">Railway deployment</text>

  <!-- Arrow 4 to 5 -->
  <line x1="890" y1="270" x2="925" y2="270" stroke="#4A90D9" stroke-width="2.5" marker-end="url(#arr-api)"/>

  <!-- STEP 5: FRONTEND DISPLAY -->
  <rect x="930" y="85" width="175" height="250" rx="12" fill="#50C878" fill-opacity="0.07" stroke="#50C878" stroke-width="2" filter="url(#shadow)"/>
  <rect x="930" y="85" width="175" height="32" rx="12" fill="#50C878"/>
  <rect x="930" y="105" width="175" height="12" fill="#50C878"/>
  <text x="1017" y="106" text-anchor="middle" font-size="13" font-weight="700" fill="#fff">5. Frontend Display</text>

  <text x="945" y="140" font-size="10" font-weight="600" fill="#2E7D4E">Next.js on Vercel:</text>
  <text x="945" y="157" font-size="9" fill="#666">11 pages, responsive</text>

  <rect x="945" y="170" width="145" height="1" fill="#50C878" fill-opacity="0.3"/>

  <text x="945" y="190" font-size="10" font-weight="600" fill="#2E7D4E">Pages:</text>
  <text x="945" y="207" font-size="9" fill="#666">Projections (table/filter)</text>
  <text x="945" y="222" font-size="9" fill="#666">Predictions (matchup cards)</text>
  <text x="945" y="237" font-size="9" fill="#666">Player detail (stat breakdown)</text>
  <text x="945" y="252" font-size="9" fill="#666">Lineups, Draft, Accuracy</text>
  <text x="945" y="267" font-size="9" fill="#666">News (4-tab sentiment)</text>
  <text x="945" y="282" font-size="9" fill="#666">Games, College, Advisor</text>

  <rect x="940" y="300" width="155" height="24" rx="6" fill="#50C878" fill-opacity="0.15" stroke="#50C878" stroke-width="1"/>
  <text x="1017" y="316" text-anchor="middle" font-size="9" font-weight="600" fill="#2E7D4E">Vercel deployment</text>

  <!-- STEP 6: AUTOMATION -->
  <rect x="930" y="355" width="175" height="100" rx="12" fill="#24292e" fill-opacity="0.05" stroke="#555" stroke-width="2" filter="url(#shadow)"/>
  <rect x="930" y="355" width="175" height="32" rx="12" fill="#24292e"/>
  <rect x="930" y="375" width="175" height="12" fill="#24292e"/>
  <text x="1017" y="376" text-anchor="middle" font-size="13" font-weight="700" fill="#fff">6. Daily Automation</text>

  <text x="945" y="408" font-size="9" fill="#666">GHA weekly pipeline (Tue)</text>
  <text x="945" y="423" font-size="9" fill="#666">Sentiment cron (daily)</text>
  <text x="945" y="438" font-size="9" fill="#666">ADP refresh (pre-draft)</text>

  <!-- Automation feedback arrow back to Bronze -->
  <path d="M 1017 460 L 1017 490 Q 1017 510 997 510 L 140 510 Q 117 510 117 490 L 117 460" stroke="#24292e" stroke-width="1.5" fill="none" marker-end="url(#arr-cron)" stroke-dasharray="6,3"/>
  <text x="560" y="525" text-anchor="middle" font-size="9" fill="#666" font-style="italic">Automated pipeline re-triggers Bronze ingestion</text>

  <!-- DATA FORMAT STRIP -->
  <rect x="30" y="560" width="1075" height="55" rx="8" fill="#fff" stroke="#dee2e6" stroke-width="1" filter="url(#shadow)"/>

  <text x="50" y="582" font-size="11" font-weight="700" fill="#333">Data Format:</text>
  <text x="50" y="602" font-size="10" fill="#666">All layers use Apache Parquet with partitioning: dataset/season=YYYY/week=WW/filename_YYYYMMDD_HHMMSS.parquet</text>

  <text x="780" y="582" font-size="11" font-weight="700" fill="#333">Read Convention:</text>
  <text x="780" y="602" font-size="10" fill="#666">Always use download_latest_parquet() from src/utils.py</text>

  <!-- PIPELINE TIMING -->
  <rect x="30" y="630" width="1075" height="145" rx="8" fill="#fff" stroke="#dee2e6" stroke-width="1" filter="url(#shadow)"/>
  <text x="50" y="656" font-size="12" font-weight="700" fill="#333">Pipeline Timing (In-Season)</text>

  <!-- Timeline bar -->
  <rect x="50" y="670" width="1035" height="4" rx="2" fill="#e9ecef"/>

  <!-- Tuesday marker -->
  <rect x="50" y="670" width="200" height="4" rx="2" fill="#CD7F32"/>
  <circle cx="50" cy="672" r="6" fill="#CD7F32" stroke="#fff" stroke-width="2"/>
  <text x="50" y="700" text-anchor="middle" font-size="9" font-weight="600" fill="#CD7F32">Tue 9am UTC</text>
  <text x="50" y="714" text-anchor="middle" font-size="8" fill="#666">Bronze ingestion</text>

  <!-- Tuesday + 30min -->
  <rect x="250" y="670" width="200" height="4" rx="2" fill="#999"/>
  <circle cx="250" cy="672" r="6" fill="#999" stroke="#fff" stroke-width="2"/>
  <text x="250" y="700" text-anchor="middle" font-size="9" font-weight="600" fill="#888">+ 30 min</text>
  <text x="250" y="714" text-anchor="middle" font-size="8" fill="#666">Silver transforms</text>

  <!-- Tuesday + 1hr -->
  <rect x="450" y="670" width="200" height="4" rx="2" fill="#DAA520"/>
  <circle cx="450" cy="672" r="6" fill="#DAA520" stroke="#fff" stroke-width="2"/>
  <text x="450" y="700" text-anchor="middle" font-size="9" font-weight="600" fill="#DAA520">+ 1 hour</text>
  <text x="450" y="714" text-anchor="middle" font-size="8" fill="#666">Gold projections</text>

  <!-- Immediate -->
  <rect x="650" y="670" width="200" height="4" rx="2" fill="#4A90D9"/>
  <circle cx="650" cy="672" r="6" fill="#4A90D9" stroke="#fff" stroke-width="2"/>
  <text x="650" y="700" text-anchor="middle" font-size="9" font-weight="600" fill="#4A90D9">Immediate</text>
  <text x="650" y="714" text-anchor="middle" font-size="8" fill="#666">API serves new data</text>

  <!-- Always -->
  <rect x="850" y="670" width="235" height="4" rx="2" fill="#50C878"/>
  <circle cx="850" cy="672" r="6" fill="#50C878" stroke="#fff" stroke-width="2"/>
  <text x="850" y="700" text-anchor="middle" font-size="9" font-weight="600" fill="#50C878">Always live</text>
  <text x="850" y="714" text-anchor="middle" font-size="8" fill="#666">Frontend displays latest</text>

  <!-- Daily -->
  <circle cx="1085" cy="672" r="6" fill="#24292e" stroke="#fff" stroke-width="2"/>
  <text x="1085" y="700" text-anchor="end" font-size="9" font-weight="600" fill="#333">Daily</text>
  <text x="1085" y="714" text-anchor="end" font-size="8" fill="#666">Sentiment refresh</text>

  <!-- Failure alert note -->
  <text x="560" y="758" text-anchor="middle" font-size="9" fill="#999" font-style="italic">On failure: GitHub Actions auto-opens issue with error details</text>

  <!-- Version stamp -->
  <text x="1160" y="788" text-anchor="end" font-size="9" fill="#aaa">v4.1 | April 2026</text>
</svg>