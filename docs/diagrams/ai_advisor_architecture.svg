<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 800" font-family="Segoe UI, Helvetica, Arial, sans-serif">
  <defs>
    <filter id="shadow" x="-2%" y="-2%" width="104%" height="108%">
      <feDropShadow dx="1" dy="2" stdDeviation="2" flood-opacity="0.1"/>
    </filter>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-auto">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#555"/>
    </marker>
    <marker id="arrowPurple" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-auto">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#9B59B6"/>
    </marker>
    <marker id="arrowBlue" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-auto">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#4A90D9"/>
    </marker>
    <marker id="arrowGreen" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-auto">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#50C878"/>
    </marker>
  </defs>

  <!-- Background -->
  <rect width="1200" height="800" fill="#FAFBFC" rx="8"/>

  <!-- Title -->
  <text x="600" y="32" text-anchor="middle" font-size="18" font-weight="700" fill="#1a1a2e">AI Advisor Architecture -- Tool-Calling Agent</text>
  <text x="600" y="50" text-anchor="middle" font-size="11" fill="#888">Gemini 2.5 Flash (primary) | Groq Llama 3.1 (fallback) | 12 Tools | Vercel AI SDK</text>

  <!-- ================================================================ -->
  <!-- USER INTERACTION (left) -->
  <!-- ================================================================ -->
  <rect x="30" y="80" width="200" height="200" rx="8" fill="#E8F8EE" stroke="#50C878" stroke-width="2" filter="url(#shadow)"/>
  <rect x="30" y="80" width="200" height="28" rx="8" fill="#50C878"/>
  <rect x="30" y="96" width="200" height="12" fill="#50C878"/>
  <text x="130" y="100" text-anchor="middle" font-size="12" font-weight="700" fill="#fff">User Interface</text>

  <!-- Chat widget mockup -->
  <rect x="50" y="120" width="160" height="145" rx="6" fill="#fff" stroke="#ccc" stroke-width="1"/>
  <rect x="50" y="120" width="160" height="22" rx="6" fill="#F0F4F8"/>
  <rect x="50" y="134" width="160" height="8" fill="#F0F4F8"/>
  <circle cx="66" cy="131" r="5" fill="#50C878"/>
  <text x="80" y="134" font-size="7.5" font-weight="600" fill="#333">AI Advisor</text>
  <text x="195" y="134" text-anchor="end" font-size="7" fill="#888">online</text>

  <!-- Chat bubbles -->
  <rect x="58" y="148" width="110" height="22" rx="8" fill="#E8F0FE"/>
  <text x="64" y="162" font-size="7" fill="#333">Should I start Hill or Chase?</text>

  <rect x="82" y="176" width="120" height="32" rx="8" fill="#F3E8FF"/>
  <text x="88" y="188" font-size="7" fill="#333">Comparing projections...</text>
  <text x="88" y="199" font-size="7" fill="#7D3C98">Start Chase (18.4 pts)</text>

  <!-- Input box -->
  <rect x="58" y="218" width="144" height="20" rx="4" fill="#F8F8F8" stroke="#ddd" stroke-width="1"/>
  <text x="66" y="232" font-size="7" fill="#aaa">Ask about your fantasy team...</text>

  <text x="130" y="250" text-anchor="middle" font-size="7.5" fill="#2E8B57">Floating chat widget</text>
  <text x="130" y="262" text-anchor="middle" font-size="7.5" fill="#2E8B57">on all dashboard pages</text>

  <!-- Arrow: User -> Next.js API -->
  <line x1="230" y1="180" x2="290" y2="180" stroke="#50C878" stroke-width="2" marker-end="url(#arrowGreen)"/>
  <text x="260" y="172" text-anchor="middle" font-size="7.5" fill="#50C878">POST</text>

  <!-- ================================================================ -->
  <!-- NEXT.JS API ROUTE -->
  <!-- ================================================================ -->
  <rect x="294" y="100" width="200" height="160" rx="8" fill="#E8F8EE" stroke="#50C878" stroke-width="2" filter="url(#shadow)"/>
  <rect x="294" y="100" width="200" height="28" rx="8" fill="#50C878"/>
  <rect x="294" y="116" width="200" height="12" fill="#50C878"/>
  <text x="394" y="120" text-anchor="middle" font-size="12" font-weight="700" fill="#fff">Next.js API Route</text>

  <text x="310" y="148" font-size="8.5" font-weight="600" fill="#2E8B57">/api/chat (POST)</text>
  <text x="310" y="162" font-size="7.5" fill="#666">Vercel AI SDK streamText()</text>
  <text x="310" y="176" font-size="7.5" fill="#666">System prompt (66 lines)</text>
  <text x="310" y="190" font-size="7.5" fill="#666">Max 5 tool-calling steps</text>
  <text x="310" y="204" font-size="7.5" fill="#666">UIMessage streaming</text>
  <text x="310" y="218" font-size="7.5" fill="#666">Error handling + fallback</text>
  <text x="310" y="238" font-size="8" fill="#2E8B57">app/api/chat/route.ts</text>

  <!-- Arrow: Next.js -> Model Selection -->
  <line x1="494" y1="180" x2="555" y2="180" stroke="#9B59B6" stroke-width="2" marker-end="url(#arrowPurple)"/>

  <!-- ================================================================ -->
  <!-- MODEL SELECTION -->
  <!-- ================================================================ -->
  <rect x="558" y="80" width="240" height="110" rx="8" fill="#F3E8FF" stroke="#9B59B6" stroke-width="2" filter="url(#shadow)"/>
  <rect x="558" y="80" width="240" height="28" rx="8" fill="#9B59B6"/>
  <rect x="558" y="96" width="240" height="12" fill="#9B59B6"/>
  <text x="678" y="100" text-anchor="middle" font-size="12" font-weight="700" fill="#fff">Model Selection</text>

  <!-- Primary -->
  <rect x="572" y="118" width="100" height="58" rx="5" fill="#fff" stroke="#9B59B6" stroke-width="1.5"/>
  <text x="622" y="136" text-anchor="middle" font-size="9" font-weight="700" fill="#7D3C98">PRIMARY</text>
  <text x="622" y="150" text-anchor="middle" font-size="8.5" font-weight="600" fill="#333">Gemini 2.5 Flash</text>
  <text x="622" y="164" text-anchor="middle" font-size="7.5" fill="#888">@ai-sdk/google</text>

  <!-- Fallback -->
  <rect x="684" y="118" width="100" height="58" rx="5" fill="#fff" stroke="#9B59B6" stroke-width="1"/>
  <text x="734" y="136" text-anchor="middle" font-size="9" font-weight="600" fill="#888">FALLBACK</text>
  <text x="734" y="150" text-anchor="middle" font-size="8.5" font-weight="600" fill="#333">Groq Llama 3.1</text>
  <text x="734" y="164" text-anchor="middle" font-size="7.5" fill="#888">8B instant</text>

  <!-- Fallback arrow -->
  <line x1="672" y1="147" x2="682" y2="147" stroke="#ccc" stroke-width="1" stroke-dasharray="3,2"/>
  <text x="677" y="142" text-anchor="middle" font-size="6" fill="#aaa">if no</text>
  <text x="677" y="156" text-anchor="middle" font-size="6" fill="#aaa">key</text>

  <!-- Arrow: Model -> Tools -->
  <line x1="678" y1="190" x2="678" y2="224" stroke="#9B59B6" stroke-width="2" marker-end="url(#arrowPurple)"/>
  <text x="690" y="212" font-size="7.5" fill="#9B59B6">tool calls</text>

  <!-- ================================================================ -->
  <!-- 12 TOOLS GRID -->
  <!-- ================================================================ -->
  <rect x="30" y="300" width="1140" height="320" rx="8" fill="#FAFAFE" stroke="#9B59B6" stroke-width="1.5"/>
  <rect x="30" y="300" width="1140" height="28" rx="8" fill="#9B59B6"/>
  <rect x="30" y="316" width="1140" height="12" fill="#9B59B6"/>
  <text x="600" y="320" text-anchor="middle" font-size="12" font-weight="700" fill="#fff">12 Tools -- Each Calls FastAPI Backend</text>

  <!-- Category: Core Fantasy (row 1) -->
  <text x="55" y="350" font-size="10" font-weight="700" fill="#7D3C98">Core Fantasy</text>
  <line x1="55" y1="354" x2="175" y2="354" stroke="#9B59B6" stroke-width="1" stroke-opacity="0.4"/>

  <rect x="55" y="362" width="170" height="56" rx="5" fill="#fff" stroke="#9B59B6" stroke-width="1" filter="url(#shadow)"/>
  <text x="140" y="378" text-anchor="middle" font-size="8.5" font-weight="600" fill="#333">getPlayerProjection</text>
  <text x="140" y="392" text-anchor="middle" font-size="7" fill="#888">Points, floor, ceiling, injury</text>
  <text x="140" y="404" text-anchor="middle" font-size="7" fill="#4A90D9">GET /api/projections</text>

  <rect x="235" y="362" width="170" height="56" rx="5" fill="#fff" stroke="#9B59B6" stroke-width="1" filter="url(#shadow)"/>
  <text x="320" y="378" text-anchor="middle" font-size="8.5" font-weight="600" fill="#333">compareStartSit</text>
  <text x="320" y="392" text-anchor="middle" font-size="7" fill="#888">Head-to-head comparison</text>
  <text x="320" y="404" text-anchor="middle" font-size="7" fill="#4A90D9">GET /api/projections</text>

  <rect x="415" y="362" width="170" height="56" rx="5" fill="#fff" stroke="#9B59B6" stroke-width="1" filter="url(#shadow)"/>
  <text x="500" y="378" text-anchor="middle" font-size="8.5" font-weight="600" fill="#333">getPositionRankings</text>
  <text x="500" y="392" text-anchor="middle" font-size="7" fill="#888">Top N at QB/RB/WR/TE/K</text>
  <text x="500" y="404" text-anchor="middle" font-size="7" fill="#4A90D9">GET /api/projections</text>

  <rect x="595" y="362" width="170" height="56" rx="5" fill="#fff" stroke="#9B59B6" stroke-width="1" filter="url(#shadow)"/>
  <text x="680" y="378" text-anchor="middle" font-size="8.5" font-weight="600" fill="#333">searchPlayers</text>
  <text x="680" y="392" text-anchor="middle" font-size="7" fill="#888">Name fragment search</text>
  <text x="680" y="404" text-anchor="middle" font-size="7" fill="#4A90D9">GET /api/players/search</text>

  <rect x="775" y="362" width="170" height="56" rx="5" fill="#fff" stroke="#9B59B6" stroke-width="1" filter="url(#shadow)"/>
  <text x="860" y="378" text-anchor="middle" font-size="8.5" font-weight="600" fill="#333">getDraftBoard</text>
  <text x="860" y="392" text-anchor="middle" font-size="7" fill="#888">ADP, VORP, value tiers</text>
  <text x="860" y="404" text-anchor="middle" font-size="7" fill="#4A90D9">GET /api/draft/board</text>

  <!-- Category: Team & Matchups (row 2) -->
  <text x="55" y="440" font-size="10" font-weight="700" fill="#7D3C98">Team & Matchups</text>
  <line x1="55" y1="444" x2="210" y2="444" stroke="#9B59B6" stroke-width="1" stroke-opacity="0.4"/>

  <rect x="55" y="452" width="170" height="56" rx="5" fill="#fff" stroke="#9B59B6" stroke-width="1" filter="url(#shadow)"/>
  <text x="140" y="468" text-anchor="middle" font-size="8.5" font-weight="600" fill="#333">getGamePredictions</text>
  <text x="140" y="482" text-anchor="middle" font-size="7" fill="#888">Spreads, totals, edges</text>
  <text x="140" y="494" text-anchor="middle" font-size="7" fill="#4A90D9">GET /api/predictions</text>

  <rect x="235" y="452" width="170" height="56" rx="5" fill="#fff" stroke="#9B59B6" stroke-width="1" filter="url(#shadow)"/>
  <text x="320" y="468" text-anchor="middle" font-size="8.5" font-weight="600" fill="#333">getTeamRoster</text>
  <text x="320" y="482" text-anchor="middle" font-size="7" fill="#888">Lineup + projections</text>
  <text x="320" y="494" text-anchor="middle" font-size="7" fill="#4A90D9">GET /api/lineups</text>

  <!-- Category: News & Sentiment (row 2 continued) -->
  <text x="435" y="440" font-size="10" font-weight="700" fill="#7D3C98">News & Sentiment</text>
  <line x1="435" y1="444" x2="590" y2="444" stroke="#9B59B6" stroke-width="1" stroke-opacity="0.4"/>

  <rect x="415" y="452" width="170" height="56" rx="5" fill="#fff" stroke="#9B59B6" stroke-width="1" filter="url(#shadow)"/>
  <text x="500" y="468" text-anchor="middle" font-size="8.5" font-weight="600" fill="#333">getNewsFeed</text>
  <text x="500" y="482" text-anchor="middle" font-size="7" fill="#888">Latest news + injuries</text>
  <text x="500" y="494" text-anchor="middle" font-size="7" fill="#4A90D9">GET /api/news/feed</text>

  <rect x="595" y="452" width="170" height="56" rx="5" fill="#fff" stroke="#9B59B6" stroke-width="1" filter="url(#shadow)"/>
  <text x="680" y="468" text-anchor="middle" font-size="8.5" font-weight="600" fill="#333">getPlayerNews</text>
  <text x="680" y="482" text-anchor="middle" font-size="7" fill="#888">Player-specific news</text>
  <text x="680" y="494" text-anchor="middle" font-size="7" fill="#4A90D9">GET /api/news/feed</text>

  <rect x="775" y="452" width="170" height="56" rx="5" fill="#fff" stroke="#9B59B6" stroke-width="1" filter="url(#shadow)"/>
  <text x="860" y="468" text-anchor="middle" font-size="8.5" font-weight="600" fill="#333">getTeamSentiment</text>
  <text x="860" y="482" text-anchor="middle" font-size="7" fill="#888">Team outlook scores</text>
  <text x="860" y="494" text-anchor="middle" font-size="7" fill="#4A90D9">GET /api/news/team</text>

  <rect x="955" y="452" width="170" height="56" rx="5" fill="#fff" stroke="#9B59B6" stroke-width="1" filter="url(#shadow)"/>
  <text x="1040" y="468" text-anchor="middle" font-size="8.5" font-weight="600" fill="#333">getSentimentSummary</text>
  <text x="1040" y="482" text-anchor="middle" font-size="7" fill="#888">Bullish/bearish overview</text>
  <text x="1040" y="494" text-anchor="middle" font-size="7" fill="#4A90D9">GET /api/news/summary</text>

  <!-- Category: External Comparison -->
  <text x="55" y="530" font-size="10" font-weight="700" fill="#7D3C98">External Comparison</text>
  <line x1="55" y1="534" x2="240" y2="534" stroke="#9B59B6" stroke-width="1" stroke-opacity="0.4"/>

  <rect x="55" y="542" width="210" height="56" rx="5" fill="#fff" stroke="#9B59B6" stroke-width="1" filter="url(#shadow)"/>
  <text x="160" y="558" text-anchor="middle" font-size="8.5" font-weight="600" fill="#333">compareExternalRankings</text>
  <text x="160" y="572" text-anchor="middle" font-size="7" fill="#888">Sleeper / FantasyPros / ESPN vs ours</text>
  <text x="160" y="584" text-anchor="middle" font-size="7" fill="#4A90D9">GET /api/rankings/compare</text>

  <!-- ================================================================ -->
  <!-- FastAPI BACKEND (right side) -->
  <!-- ================================================================ -->
  <rect x="860" y="80" width="310" height="200" rx="8" fill="#E8F0FE" stroke="#4A90D9" stroke-width="2" filter="url(#shadow)"/>
  <rect x="860" y="80" width="310" height="28" rx="8" fill="#4A90D9"/>
  <rect x="860" y="96" width="310" height="12" fill="#4A90D9"/>
  <text x="1015" y="100" text-anchor="middle" font-size="12" font-weight="700" fill="#fff">FastAPI Backend (Railway)</text>

  <text x="880" y="126" font-size="9" font-weight="600" fill="#4A90D9">Endpoints called by tools:</text>

  <text x="880" y="144" font-size="8" fill="#666">GET /api/projections        -- player data + rankings</text>
  <text x="880" y="158" font-size="8" fill="#666">GET /api/players/search      -- name fragment lookup</text>
  <text x="880" y="172" font-size="8" fill="#666">GET /api/predictions         -- game lines + edges</text>
  <text x="880" y="186" font-size="8" fill="#666">GET /api/lineups             -- team rosters</text>
  <text x="880" y="200" font-size="8" fill="#666">GET /api/draft/board         -- draft rankings</text>
  <text x="880" y="214" font-size="8" fill="#666">GET /api/news/feed           -- articles + injuries</text>
  <text x="880" y="228" font-size="8" fill="#666">GET /api/news/team           -- team sentiment</text>
  <text x="880" y="242" font-size="8" fill="#666">GET /api/news/summary        -- overall sentiment</text>
  <text x="880" y="256" font-size="8" fill="#666">GET /api/rankings/compare    -- external comparison</text>

  <!-- Connecting arrow from model to backend -->
  <line x1="798" y1="135" x2="857" y2="135" stroke="#9B59B6" stroke-width="1.5" stroke-dasharray="5,3" marker-end="url(#arrowPurple)"/>

  <!-- ================================================================ -->
  <!-- RESPONSE FLOW (bottom) -->
  <!-- ================================================================ -->
  <rect x="30" y="640" width="1140" height="130" rx="8" fill="#fff" stroke="#ddd" stroke-width="1"/>
  <text x="600" y="664" text-anchor="middle" font-size="12" font-weight="700" fill="#333">Request / Response Flow</text>

  <!-- Flow steps -->
  <rect x="55" y="680" width="130" height="40" rx="6" fill="#50C878" filter="url(#shadow)"/>
  <text x="120" y="704" text-anchor="middle" font-size="9" font-weight="600" fill="#fff">User Query</text>

  <line x1="185" y1="700" x2="215" y2="700" stroke="#555" stroke-width="1.5" marker-end="url(#arrow)"/>

  <rect x="218" y="680" width="130" height="40" rx="6" fill="#50C878" fill-opacity="0.8" filter="url(#shadow)"/>
  <text x="283" y="698" text-anchor="middle" font-size="9" font-weight="600" fill="#fff">Next.js Route</text>
  <text x="283" y="710" text-anchor="middle" font-size="7" fill="#fff">/api/chat POST</text>

  <line x1="348" y1="700" x2="378" y2="700" stroke="#555" stroke-width="1.5" marker-end="url(#arrow)"/>

  <rect x="381" y="680" width="130" height="40" rx="6" fill="#9B59B6" filter="url(#shadow)"/>
  <text x="446" y="698" text-anchor="middle" font-size="9" font-weight="600" fill="#fff">Gemini / Groq</text>
  <text x="446" y="710" text-anchor="middle" font-size="7" fill="#fff">streamText()</text>

  <line x1="511" y1="700" x2="541" y2="700" stroke="#555" stroke-width="1.5" marker-end="url(#arrow)"/>

  <rect x="544" y="680" width="130" height="40" rx="6" fill="#9B59B6" fill-opacity="0.7" filter="url(#shadow)"/>
  <text x="609" y="698" text-anchor="middle" font-size="9" font-weight="600" fill="#fff">Tool Execution</text>
  <text x="609" y="710" text-anchor="middle" font-size="7" fill="#fff">1-5 steps</text>

  <line x1="674" y1="700" x2="704" y2="700" stroke="#555" stroke-width="1.5" marker-end="url(#arrow)"/>

  <rect x="707" y="680" width="130" height="40" rx="6" fill="#4A90D9" filter="url(#shadow)"/>
  <text x="772" y="698" text-anchor="middle" font-size="9" font-weight="600" fill="#fff">FastAPI Data</text>
  <text x="772" y="710" text-anchor="middle" font-size="7" fill="#fff">JSON response</text>

  <line x1="837" y1="700" x2="867" y2="700" stroke="#555" stroke-width="1.5" marker-end="url(#arrow)"/>

  <rect x="870" y="680" width="130" height="40" rx="6" fill="#9B59B6" fill-opacity="0.7" filter="url(#shadow)"/>
  <text x="935" y="698" text-anchor="middle" font-size="9" font-weight="600" fill="#fff">LLM Synthesis</text>
  <text x="935" y="710" text-anchor="middle" font-size="7" fill="#fff">Natural language</text>

  <line x1="1000" y1="700" x2="1030" y2="700" stroke="#555" stroke-width="1.5" marker-end="url(#arrow)"/>

  <rect x="1033" y="680" width="120" height="40" rx="6" fill="#50C878" filter="url(#shadow)"/>
  <text x="1093" y="698" text-anchor="middle" font-size="9" font-weight="600" fill="#fff">Streaming UI</text>
  <text x="1093" y="710" text-anchor="middle" font-size="7" fill="#fff">Chat widget</text>

  <!-- Timing annotations -->
  <text x="600" y="742" text-anchor="middle" font-size="8" fill="#888">Average response: 2-5 seconds | Max duration: 30 seconds | Tool results cached: no-store</text>

  <!-- Legend -->
  <rect x="100" y="758" width="1000" height="26" rx="4" fill="#fff" stroke="#ddd" stroke-width="1"/>
  <rect x="120" y="766" width="10" height="10" rx="2" fill="#50C878"/>
  <text x="136" y="775" font-size="8.5" fill="#555">Frontend</text>
  <rect x="200" y="766" width="10" height="10" rx="2" fill="#9B59B6"/>
  <text x="216" y="775" font-size="8.5" fill="#555">AI Model</text>
  <rect x="280" y="766" width="10" height="10" rx="2" fill="#4A90D9"/>
  <text x="296" y="775" font-size="8.5" fill="#555">API Backend</text>
  <line x1="380" y1="771" x2="410" y2="771" stroke="#555" stroke-width="1.5" marker-end="url(#arrow)"/>
  <text x="420" y="775" font-size="8.5" fill="#555">Data flow</text>
  <line x1="480" y1="771" x2="510" y2="771" stroke="#9B59B6" stroke-width="1.5" stroke-dasharray="5,3"/>
  <text x="520" y="775" font-size="8.5" fill="#555">Tool call</text>
</svg>